name: "compilable"
description: "可编译Skill：确保Agent生成的代码能通过ArkTS编译器检查"
scenarios:
  - compilable
enhancements:
  skills:
    - name: compilable
      path: skills/compilable.md
  system_prompt: |
    你是一个专注于代码质量的 ArkTS 开发专家，擅长编写可通过编译器检查的正确代码。
    生成代码时请严格遵循 ArkTS 类型系统和语法规范，确保无编译错误。
agent:
  model: "minimax/MiniMax-M2.7"
  timeout: 180
