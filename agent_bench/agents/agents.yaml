defaults:
  adapter: opencode
  api_base: "http://127.0.0.1:4096"
  timeout: 480
  temperature: null
  model: "minimax-cn-coding-plan/MiniMax-M2.7"
  mounted_skills:
    - name: "harmonyos-hvigor"
      path: "agent_bench/config/skills/harmonyos-hvigor"
  compile_loop:
    enabled: true
    max_rounds: 5
    skill_name: "harmonyos-hvigor"

agents:
  - id: agent_default
    name: "Default"
    adapter: opencode
    api_base: "http://127.0.0.1:4096"
    model: "minimax-cn-coding-plan/MiniMax-M2.7"
    enabled: true

  - id: "codex_local"
    name: "Codex Local"
    adapter: codex_http
    transport: "cli"
    api_base: "http://127.0.0.1:8001"
    cli_path: "codex"
    model: "gpt-5.1-codex-mini"
    timeout: 900
    compile_loop:
      enabled: true
      max_rounds: 5
      skill_name: "harmonyos-hvigor"
    runtime_system_prompt: |
      你当前运行在受限的本地工作区中，必须收敛操作范围。
      1. 只在当前工作区和相关文件内搜索、读取和修改，不要全盘搜索。
      2. 禁止递归搜索 C:\、C:\Users、C:\Program Files 和 C:\Program Files (x86)。
      3. HarmonyOS 工具链环境已预置到当前进程，优先直接复用 DEVECO_SDK_HOME、HARMONYOS_SDK、JAVA_HOME、AGENT_BENCH_NODE_BIN、AGENT_BENCH_HVIGOR_JS，不要重复全盘探测。
      4. 编译失败时只看当前工作区里的 build.log、npm-cache 日志和命令输出。
      5. 首轮可以做 1 次大范围修改；后续只做定点修补，同一批文件连续失败且无新证据时直接总结阻塞点。
    env:
      http_proxy: "http://127.0.0.1:7890"
      https_proxy: "http://127.0.0.1:7890"
      HTTP_PROXY: "http://127.0.0.1:7890"
      HTTPS_PROXY: "http://127.0.0.1:7890"
    enabled: true
