# ArkTS Code Quality Review Rubric
# Version: 8.0
# Date: 2026-03-30
#
# 评分维度：3个，与 internal_rules.yaml 维度一一对应
# 总分：100分
# 通过门槛：60分
#
# 重构说明（v8.0）：
# - 按"基本质量→工程可信→生态与创新"三层组织
# - 比例：basic_quality(40%) / engineering_trust(40%) / ecosystem_innovation(20%)
# - 基本质量：组件可编译性、兼容性、基础体验、稳定性等
# - 工程可信：异常处理、组件规范、代码质量等
# - 生态与创新：应用或者元服务的生态规则、行业创新能力等

rubric_name: "ArkTS代码质量评判标准"
total_score: 100
pass_threshold: 60

# ============================================================
# 评分维度定义
# ============================================================
dimensions:
  # ----------------------------------------------------------
  # 维度1：基本质量 (40%)
  # ----------------------------------------------------------
  - dimension_id: basic_quality
    name: 基本质量
    weight: 40
    description: "组件可编译性、兼容性、基础体验、稳定性等"
    rules:
      - id: B1
        name: 类型定义规范
        name_en: Type Definition
        description: "禁止使用any，接口/类型定义清晰"
        check_points:
          - "避免使用any类型"
          - "接口/类型别名定义清晰"
          - "泛型约束合理"

      - id: B2
        name: 编译通过
        name_en: Compilability
        description: "代码可通过ArkTS编译器检查"
        check_points:
          - "代码可通过hvigor编译"
          - "无编译错误"

  # ----------------------------------------------------------
  # 维度2：工程可信 (40%)
  # ----------------------------------------------------------
  - dimension_id: engineering_trust
    name: 工程可信
    weight: 40
    description: "异常处理、组件规范、代码质量等"
    rules:
      - id: E1
        name: 异常处理
        name_en: Exception Handling
        description: "异步操作是否有完善的异常处理"
        check_points:
          - "异步操作有.catch()处理"
          - "try/catch块正确使用"

      - id: E2
        name: 代码重复度
        name_en: Code Duplication
        description: "是否存在不必要的重复"
        check_points:
          - "重复代码块已提取为公共函数"
          - "相似逻辑已复用"

      - id: E3
        name: 禁止废弃API
        name_en: No Deprecated API
        description: "禁止使用已废弃的API"
        check_points:
          - "避免使用已废弃的router.push"

  # ----------------------------------------------------------
  # 维度3：生态与创新 (20%)
  # ----------------------------------------------------------
  - dimension_id: ecosystem_innovation
    name: 生态与创新
    weight: 20
    description: "应用或者元服务的生态规则、行业创新能力等"
    rules:
      - id: G1
        name: 日志规范
        name_en: Logging Convention
        description: "应使用hilog替代console.log"
        check_points:
          - "使用hilog进行日志输出"
          - "避免使用console.log"

      - id: G2
        name: 路由规范
        name_en: Routing Convention
        description: "应使用Navigation路由"
        check_points:
          - "使用Navigation路由"
          - "避免使用已废弃的router.push"

# ============================================================
# 输出格式定义
# ============================================================
output_format:
  type: "json"
  example: |
    {
      "total_score": 85,
      "passed": true,
      "dimensions": [
        {
          "dimension_id": "basic_quality",
          "name": "基本质量",
          "score": 90,
          "rules": [
            {"id": "B1", "name": "类型定义规范", "score": 10, "comment": "通过"},
            {"id": "B2", "name": "编译通过", "score": 8, "comment": "存在编译问题"}
          ]
        }
      ],
      "summary": "代码质量良好，组件设计合理"
    }

# ============================================================
# 使用说明
# ============================================================
usage:
  prompt_template: |
    你是一个鸿蒙ArkTS代码质量评审专家。
    请根据以下评分标准，对提供的代码进行评审。

    评分标准：
    {rubric_content}

    待评审代码：
    {code_to_review}

    请按照output_format中定义的JSON格式输出评审结果。