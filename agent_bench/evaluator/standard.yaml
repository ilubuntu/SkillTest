# ArkTS Code Quality Review Rubric
# Version: 8.0
# Date: 2026-03-30
#
# 评分维度：3个，与 internal_rules.yaml 维度一一对应
# 总分：100分
# 通过门槛：60分
#
# 重构说明（v8.0）：
# - 按"基本质量→工程可信→生态与创新"三层组织
# - 比例：basic_quality(40%) / engineering_trust(40%) / ecosystem_innovation(20%)
# - 基本质量：组件可编译性、兼容性、基础体验、稳定性等
# - 工程可信：异常处理、组件规范、代码质量等
# - 生态与创新：应用或者元服务的生态规则、行业创新能力等

rubric_name: "ArkTS代码质量评判标准"
total_score: 100
pass_threshold: 60

# ============================================================
# 评分维度定义
# ============================================================
dimensions:
  # ----------------------------------------------------------
  # 维度1：基本质量 (40%)
  # ----------------------------------------------------------
  - dimension_id: basic_quality
    name: 基本质量
    weight: 40
    description: "组件可编译性、兼容性、基础体验、稳定性等"
    rules:
      - id: B1
        name: EventHub事件订阅释放
        name_en: EventHub Subscription Cleanup
        description: "使用 eventhub.on 接口订阅事件后，必须在合适的地方（如aboutToDisappear）调用 eventhub.off 释放订阅，否则会导致内存泄露"
        check_points:
          - "使用 eventhub.on 订阅事件时，需配套编写 eventhub.off 释放代码"
          - "eventhub.off 应在 aboutToDisappear 或其他合适的生命周期中调用"
          - "释放时使用的回调需与订阅时的回调保持一致（同一函数引用）"
        hit_conditions:
          - "命中场景：代码中使用了 eventhub.on 但未找到对应的 eventhub.off 进行释放"
          - "未命中：eventhub.on 和 eventhub.off 配对出现，且在同一文件或同一组件内"
          - "边界情况：若代码中完全未使用 eventhub.on，则该项不适用（N/A）"
        examples:
          correct: |
            // 正确：在 aboutToDisappear 中释放事件订阅
            private callback = (data) => { console.info(data) }

            aboutToAppear() {
              eventhub.on('eventName', this.callback)
            }

            aboutToDisappear() {
              eventhub.off('eventName', this.callback)
            }
          incorrect: |
            // 错误：只订阅不释放，会导致内存泄露
            aboutToAppear() {
              eventhub.on('eventName', (data) => { console.info(data) })
            }
            // 缺少 aboutToDisappear 中的 eventhub.off

      - id: B2
        name: EventHub事件订阅完整性
        name_en: EventHub Subscription Integrity
        description: "如果代码中使用 eventhub.emit 触发了某个事件，则必须存在对应的 eventhub.on 订阅该事件，否则 emit 的事件将无人接收，形同虚设"
        check_points:
          - "eventhub.emit 触发的事件名必须能在代码中找到对应的 eventhub.on 订阅"
          - "订阅事件名与触发事件名必须完全一致（区分大小写）"
          - "emit 和 on 可以在同一文件内，也可以在不同文件/组件间"
        hit_conditions:
          - "命中场景：代码中存在 eventhub.emit('eventName', ...) 但在整个项目代码中找不到对应的 eventhub.on('eventName', ...) 订阅"
          - "未命中：每个 eventhub.emit 的事件名都能找到对应的 eventhub.on 订阅"
          - "边界情况：若代码中完全未使用 eventhub.emit，则该项不适用（N/A）"
        examples:
          correct: |
            // 正确：emit 触发的事件有对应的 on 订阅
            // SettingsPage
            eventhub.emit('displayModeChange', { mode: 'grid' })

            // AppDisplayPage
            eventhub.on('displayModeChange', this.callback)
          incorrect: |
            // 错误：emit 了事件但没有对应的订阅
            eventhub.emit('displayModeChange', { mode: 'grid' })
            // 但没有任何地方调用 eventhub.on('displayModeChange', ...)

      - id: B3
        name: 组件API能力检测
        name_en: Component Capability Check
        description: "使用某些需要设备能力支持的组件或API前，应进行能力检测，避免在不支持的设备上运行崩溃"
        check_points:
          - "使用卡片能力、分布式能力等前应检测设备是否支持"
          - "使用特定传感器、NFC、Bluetooth等硬件能力前应进行能力检测"
          - "使用@ohos开头的系统API前应检查API可用性"
        hit_conditions:
          - "命中场景：代码中直接使用了需要特定能力的API或组件，但未进行能力检测"
          - "未命中：使用能力相关API前进行了 canIUse() 或类似的能力检测"
          - "边界情况：若代码中未使用任何需要特殊硬件能力的API，则该项不适用（N/A）"
        examples:
          correct: |
            // 正确：使用能力前先检测
            if (canIUse('SystemCapability.Security.FaceAuth')) {
              // 使用面容识别能力
            }
          incorrect: |
            // 错误：直接使用未检测的能力
            import facialRecognition from '@kit.FacialAuth'
            // 直接调用面容识别，未检测设备是否支持

      - id: B4
        name: 大数据列表懒加载规范
        name_en: Large List Lazy Loading Convention
        description: "对于数据量较大的列表（超过20项），应使用LazyForEach代替ForEach，并合理设置cachedCount，以提升列表滑动性能和内存占用"
        check_points:
          - "数据量超过20项的列表应使用LazyForEach实现懒加载"
          - "LazyForEach应配合cachedCount设置合理的缓存数量"
          - "避免使用普通ForEach渲染大数据量列表"
        hit_conditions:
          - "命中场景1：数据源数组长度超过20项，但使用普通ForEach而非LazyForEach"
          - "命中场景2：使用LazyForEach但未设置cachedCount"
          - "未命中：列表数据量小（<=20项）或正确使用LazyForEach+cachedCount"
          - "边界情况：若代码中无列表渲染相关代码，则该项不适用（N/A）"
        examples:
          correct: |
            // 正确：使用LazyForEach懒加载
            LazyForEach(this.largeDataSource, (item: Item) => {
              ListItem() { Text(item.name) }
            }, (item: Item) => item.id.toString())
            .cachedCount(5)
          incorrect: |
            // 错误：大数据量使用普通ForEach
            ForEach(this.largeDataSource, (item: Item) => {
              ListItem() { Text(item.name) }
            })

  # ----------------------------------------------------------
  # 维度2：工程可信 (40%)
  # ----------------------------------------------------------
  - dimension_id: engineering_trust
    name: 工程可信
    weight: 40
    description: "异常处理、组件规范、代码质量等"
    rules:
      - id: E1
        name: 路由规范
        name_en: Routing Convention
        description: "路由跳转应使用Navigation路由，不推荐使用router路由"
        check_points:
          - "使用 Navigation 组件实现路由"
          - "避免使用 router.pushUrl / router.replaceUrl 等方法"
          - "ArkTS新项目应优先采用声明式 Navigation 路由"
        hit_conditions:
          - "命中场景：代码中使用了 router.pushUrl 或 router.replaceUrl"
          - "未命中：代码仅使用 Navigation 路由或无路由代码"
        examples:
          correct: |
            // 使用 Navigation 路由
            Navigation() { ... }
            .onNavDestinationSwitch((info: NavDestinationContext) => { ... })
          incorrect: |
            // 使用 router 方式（不推荐）
            router.pushUrl({ url: 'pages/Index' })
            router.replaceUrl({ url: 'pages/Index' })

      - id: E2
        name: ForEach keyGenerator规范
        name_en: ForEach keyGenerator Convention
        description: "使用 ForEach 接口时，第三个参数 keyGenerator 必填，且生成的 key 值不能重复，否则会影响列表渲染性能和更新正确性"
        check_points:
          - "ForEach 必需指定 keyGenerator 参数作为第三个参数"
          - "keyGenerator 生成的 key 值必须唯一，不能重复"
          - "建议使用数据中唯一标识字段或索引组合来生成不重复的 key"
        hit_conditions:
          - "命中场景1：代码中使用了 ForEach 但未指定 keyGenerator 参数"
          - "命中场景2：keyGenerator 返回的值存在重复（如仅使用 index 作为 key）"
          - "未命中：ForEach 正确指定了 keyGenerator 且生成的 key 值唯一"
          - "边界情况：若代码中完全未使用 ForEach，则该项不适用（N/A）"
        examples:
          correct: |
            // 正确：指定唯一 keyGenerator
            ForEach(this.items, (item: Item, index: number) => {
              // ...
            }, (item: Item, index: number) => `${item.id}_${index}`)
          incorrect: |
            // 错误1：未指定 keyGenerator
            ForEach(this.items, (item: Item) => {
              // ...
            })

            // 错误2：keyGenerator 返回值重复（仅用 index）
            ForEach(this.items, (item: Item, index: number) => {
              // ...
            }, (item: Item, index: number) => `${index}`)

      - id: E3
        name: 状态管理装饰器规范
        name_en: State Management Decorator Convention
        description: "应用状态管理中，如果存储的数据用于UI更新，则需按V1/V2规范使用对应装饰器。V1使用@Observed装饰类，V2使用@ObservedV2装饰类+@Trace装饰数据字段，否则UI无法响应数据变化"
        check_points:
          - "V1状态管理：使用@Observed装饰类，用于UI更新的类属性不加@Trace"
          - "V2状态管理：使用@ObservedV2装饰类，类中用于UI更新的数据字段必须加@Trace装饰器"
          - "@Trace用于标记类中需要被追踪的成员属性，属性变更时通知UI更新"
        hit_conditions:
          - "命中场景1（V1）：类使用@Observed装饰，但类中的数据字段（如fontSize、isGridMode等）未用于@ObjectLink/@State关联，却直接在UI绑定处使用（如.fontSize(this.xxx)），缺少必要的@Observed装饰"
          - "命中场景2（V2）：类使用@ObservedV2装饰，但类中用于UI更新的数据字段缺少@Trace装饰器，导致属性变更时UI不刷新"
          - "未命中：V1状态下类正确使用@Observed；V2状态下类使用@ObservedV2+@Trace装饰用于UI更新的字段"
          - "边界情况：若类/结构体数据仅作为普通变量使用，不涉及UI绑定，则不适用（N/A）"
        examples:
          correct: |
            // V2正确：@ObservedV2 + @Trace
            @ObservedV2
            class FontSettings {
              @Trace fontSize: number = 16  // 用于UI更新，必须加@Trace
            }

            // V1正确：@Observed装饰类
            @Observed
            class FontSettings {
              fontSize: number = 16  // V1不加@Trace
            }
          incorrect: |
            // V2错误：缺少@Trace
            @ObservedV2
            class FontSettings {
              fontSize: number = 16  // 缺少@Trace，UI不刷新
            }

      - id: E4
        name: 硬编码字符串规范
        name_en: Hardcoded String Convention
        description: "代码中不应存在硬编码的字符串字面量，应提取为常量或资源引用，以便后续维护和多语言支持"
        check_points:
          - "UI显示文本、错误消息、提示文案等应使用资源文件或常量定义"
          - "避免在代码中直接使用中文字符串或英文提示语"
          - "重复出现的字符串应提取为常量避免散落各处"
        hit_conditions:
          - "命中场景1：代码中存在未提取的中文字符串字面量（如'你好'、'请输入'）"
          - "命中场景2：同一字符串在代码中出现3次以上且未提取为常量"
          - "未命中：所有用户可见字符串均通过资源文件或常量定义"
          - "边界情况：调试日志、临时测试代码中的字符串不纳入检查"
        examples:
          correct: |
            // 正确：使用常量或资源
            const PROMPT_TEXT: string = '请输入用户名'
            Text($r('app.string.username_hint'))
          incorrect: |
            // 错误：硬编码字符串
            Text('请输入用户名')
            TextInput({ placeholder: '请输入密码' })

      - id: E5
        name: 魔法值禁用规范
        name_en: No Magic Numbers Convention
        description: "代码中不应存在未命名的数字或字符串常量（魔法值），应提取为有意义的常量或枚举，提升代码可读性和可维护性"
        check_points:
          - "数字常量（如1、20、100等）应提取为命名常量"
          - "重复出现的数字或字符串应定义为常量"
          - "状态码、类型码等应使用枚举替代"
        hit_conditions:
          - "命中场景1：代码中存在未定义直接使用的数字字面量（如 this.slider.value = 16）"
          - "命中场景2：同一数字或字符串在代码中出现2次以上且未提取为常量"
          - "未命中：所有数字/字符串都定义为常量或枚举"
          - "边界情况：0、1、-1作为边界判断、索引初始值等通用场景不计入"
        examples:
          correct: |
            // 正确：使用常量
            const DEFAULT_FONT_SIZE: number = 16
            const MAX_RETRY_COUNT: number = 3
            TextInput().fontSize(DEFAULT_FONT_SIZE)
          incorrect: |
            // 错误：魔法值
            TextInput().fontSize(16)  // 16未定义
            if (retryCount > 3) { }  // 3重复出现

  # ----------------------------------------------------------
  # 维度3：生态与创新 (20%)
  # ----------------------------------------------------------
  - dimension_id: ecosystem_innovation
    name: 生态与创新
    weight: 20
    description: "应用或者元服务的生态规则、行业创新能力等"
    rules: []

# ============================================================
# 输出格式定义
# ============================================================
output_format:
  type: "json"
  example: |
    {
      "total_score": 85,
      "passed": true,
      "dimensions": [
        {
          "dimension_id": "basic_quality",
          "name": "基本质量",
          "score": 90,
          "rules": [
            {"id": "B1", "name": "类型定义规范", "score": 10, "comment": "通过"},
            {"id": "B2", "name": "编译通过", "score": 8, "comment": "存在编译问题"}
          ]
        }
      ],
      "summary": "代码质量良好，组件设计合理"
    }

# ============================================================
# 使用说明
# ============================================================
usage:
  prompt_template: |
    你是一个鸿蒙ArkTS代码质量评审专家。
    请根据以下评分标准，对提供的代码进行评审。

    评分标准：
    {rubric_content}

    待评审代码：
    {code_to_review}

    请按照output_format中定义的JSON格式输出评审结果。