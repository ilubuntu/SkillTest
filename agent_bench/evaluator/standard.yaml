# ArkTS Code Quality Review Rubric
# Version: 8.0
# Date: 2026-03-30
#
# 评分维度：3个，与 internal_rules.yaml 维度一一对应
# 总分：100分
# 通过门槛：60分
#
# 重构说明（v8.0）：
# - 按"基本质量→工程可信→生态与创新"三层组织
# - 比例：basic_quality(40%) / engineering_trust(40%) / ecosystem_innovation(20%)
# - 基本质量：组件可编译性、兼容性、基础体验、稳定性等
# - 工程可信：异常处理、组件规范、代码质量等
# - 生态与创新：应用或者元服务的生态规则、行业创新能力等

rubric_name: "ArkTS代码质量评判标准"
total_score: 100
pass_threshold: 60

# ============================================================
# 评分维度定义
# ============================================================
dimensions:
  # ----------------------------------------------------------
  # 维度1：基本质量 (40%)
  # ----------------------------------------------------------
  - dimension_id: basic_quality
    name: 基本质量
    weight: 40
    description: "组件可编译性、兼容性、基础体验、稳定性等"
    rules:
      - id: B1
        name: EventHub事件订阅释放
        name_en: EventHub Subscription Cleanup
        description: "使用 eventhub.on 接口订阅事件后，必须在合适的地方（如aboutToDisappear）调用 eventhub.off 释放订阅，否则会导致内存泄露"
        check_points:
          - "使用 eventhub.on 订阅事件时，需配套编写 eventhub.off 释放代码"
          - "eventhub.off 应在 aboutToDisappear 或其他合适的生命周期中调用"
          - "释放时使用的回调需与订阅时的回调保持一致（同一函数引用）"
        hit_conditions:
          - "命中场景：代码中使用了 eventhub.on 但未找到对应的 eventhub.off 进行释放"
          - "未命中：eventhub.on 和 eventhub.off 配对出现，且在同一文件或同一组件内"
          - "边界情况：若代码中完全未使用 eventhub.on，则该项不适用（N/A）"
        examples:
          correct: |
            // 正确：在 aboutToDisappear 中释放事件订阅
            private callback = (data) => { console.info(data) }

            aboutToAppear() {
              eventhub.on('eventName', this.callback)
            }

            aboutToDisappear() {
              eventhub.off('eventName', this.callback)
            }
          incorrect: |
            // 错误：只订阅不释放，会导致内存泄露
            aboutToAppear() {
              eventhub.on('eventName', (data) => { console.info(data) })
            }
            // 缺少 aboutToDisappear 中的 eventhub.off

  # ----------------------------------------------------------
  # 维度2：工程可信 (40%)
  # ----------------------------------------------------------
  - dimension_id: engineering_trust
    name: 工程可信
    weight: 40
    description: "异常处理、组件规范、代码质量等"
    rules:
      - id: E1
        name: 路由规范
        name_en: Routing Convention
        description: "路由跳转应使用Navigation路由，不推荐使用router路由"
        check_points:
          - "使用 Navigation 组件实现路由"
          - "避免使用 router.pushUrl / router.replaceUrl 等方法"
          - "ArkTS新项目应优先采用声明式 Navigation 路由"
        hit_conditions:
          - "命中场景：代码中使用了 router.pushUrl 或 router.replaceUrl"
          - "未命中：代码仅使用 Navigation 路由或无路由代码"
        examples:
          correct: |
            // 使用 Navigation 路由
            Navigation() { ... }
            .onNavDestinationSwitch((info: NavDestinationContext) => { ... })
          incorrect: |
            // 使用 router 方式（不推荐）
            router.pushUrl({ url: 'pages/Index' })
            router.replaceUrl({ url: 'pages/Index' })

  # ----------------------------------------------------------
  # 维度3：生态与创新 (20%)
  # ----------------------------------------------------------
  - dimension_id: ecosystem_innovation
    name: 生态与创新
    weight: 20
    description: "应用或者元服务的生态规则、行业创新能力等"
    rules: []

# ============================================================
# 输出格式定义
# ============================================================
output_format:
  type: "json"
  example: |
    {
      "total_score": 85,
      "passed": true,
      "dimensions": [
        {
          "dimension_id": "basic_quality",
          "name": "基本质量",
          "score": 90,
          "rules": [
            {"id": "B1", "name": "类型定义规范", "score": 10, "comment": "通过"},
            {"id": "B2", "name": "编译通过", "score": 8, "comment": "存在编译问题"}
          ]
        }
      ],
      "summary": "代码质量良好，组件设计合理"
    }

# ============================================================
# 使用说明
# ============================================================
usage:
  prompt_template: |
    你是一个鸿蒙ArkTS代码质量评审专家。
    请根据以下评分标准，对提供的代码进行评审。

    评分标准：
    {rubric_content}

    待评审代码：
    {code_to_review}

    请按照output_format中定义的JSON格式输出评审结果。