# 内部评分系统规则库
# 3 个维度，与 standard.yaml 中的 rubric 维度一一对应
#
# level: HIGH(50%) / MEDIUM(30%) / LOW(20%) — 规则在维度内的权重比例
# pattern: Python re.search 正则，针对代码文本匹配
# pass_on_match: true = 匹配到算通过； false = 匹配到算不通过（反例检测）
# 规则未匹配到任何内容（match 为空） → 默认通过
#
# 重构说明（v8.0）：
# - 按"基本质量(40%)→工程可信(40%)→生态与创新(20%)"三层组织
# - 基本质量：组件可编译性、兼容性、基础体验、稳定性等
# - 工程可信：异常处理、组件规范、代码质量等
# - 生态与创新：应用或者元服务的生态规则、行业创新能力等

# ==================== 基本质量 ====================
basic_quality:
  - name: 类型定义规范
    level: HIGH
    description: 禁止使用 any 类型
    pattern: ":\\s*any\\b"
    pass_on_match: false

  - name: 编译通过
    level: HIGH
    description: 代码可通过 ArkTS 编译器检查（由 compile_results 判定）
    pattern: ".*"
    pass_on_match: true

# ==================== 工程可信 ====================
engineering_trust:
  - name: 异常处理
    level: HIGH
    description: 异步操作应有 .catch() 或 try/catch 进行异常处理
    pattern: "\\.catch\\s*\\(|try\\s*\\{"
    pass_on_match: true

  - name: 代码重复度
    level: MEDIUM
    description: 重复代码应提取为公共函数
    pattern: "function\\s+\\w+\\s*\\("
    pass_on_match: true

  - name: 禁止废弃API
    level: MEDIUM
    description: 应使用 Navigation 路由，禁止使用已废弃的 router.push
    pattern: "router\\.push\\s*\\("
    pass_on_match: false

# ==================== 生态与创新 ====================
ecosystem_innovation:
  - name: 日志规范
    level: HIGH
    description: 应使用 hilog 替代 console.log 进行日志输出
    pattern: "console\\.log\\s*\\("
    pass_on_match: false

  - name: 路由规范
    level: MEDIUM
    description: 应使用 Navigation 路由
    pattern: "router\\.push\\s*\\("
    pass_on_match: false