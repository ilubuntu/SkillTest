    - "cachedCount"
  must_not_contain:
    - "TODO"
  rubric:
    - name: correctness
      weight: 40
      criteria: "是否正确设置了autoPlay和interval参数，cachedCount设置是否合理"
    - name: completeness
      weight: 30
      criteria: "是否包含完整的指示器配置和图片加载优化"
