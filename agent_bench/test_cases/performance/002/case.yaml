case:
  id: performance_002
  scenario: performance
  title: 联系人分组索引列表性能优化
  prompt: 这是一个列表与性能类需求。请基于当前 HarmonyOS 工程实现一个联系人列表页面，联系人按首字母分组展示，右侧提供索引栏，点击字母后通过 scrollToIndex 快速定位到对应分组。页面需使用 List 和 ListItemGroup 组织结构，并使用 @Local 管理当前高亮索引。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，主入口保持在 entry/src/main/ets/pages/Index.ets，并在回复中说明分组结构、索引定位和高亮实现方式。
constraints:
- id: HM-PERF-002-01
  name: 长联系人列表必须使用分组容器降低渲染开销
  description: 页面应使用 List 和 ListItemGroup 组织联系人分组，避免把长列表扁平化后扩大单次渲染和重排范围。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-PERF-002-01-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: ListItemGroup
    - rule_id: HM-PERF-002-01-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: List(
- id: HM-PERF-002-02
  name: 索引跳转必须复用 Scroller 并直接定位目标分组
  description: 点击索引栏时应复用 Scroller 并通过 scrollToIndex 直接定位目标分组，避免手动遍历或重建列表带来的额外开销。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-PERF-002-02-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: scrollToIndex\(
    - rule_id: HM-PERF-002-02-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: \bScroller\b
- id: HM-PERF-002-03
  name: 索引栏与分组列表必须分层渲染以缩小刷新范围
  description: 索引栏和联系人分组应分别渲染，让索引高亮更新与分组列表渲染解耦，避免单一大循环放大刷新影响面。
  priority: P2
  check_method:
    rules:
    - rule_id: HM-PERF-002-03-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: (?:ForEach\([\s\S]*?){2,}
    - rule_id: HM-PERF-002-03-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Local\s+\w+'
- id: HM-PERF-002-04
  name: 页面路由管理必须统一使用 Navigation
  description: 页面路由必须统一使用 Navigation + NavPathStack / NavDestination 等声明式导航能力，禁止继续使用旧版 router。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-PERF-002-04-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: Navigation\s*\(
    - rule_id: HM-PERF-002-04-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: NavPathStack\s*=\s*new\s+NavPathStack\s*\(
    - rule_id: HM-PERF-002-04-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_not_contains
      pattern: \brouter\.
- id: HM-PERF-002-05
  name: 页面状态管理必须统一使用 V2 装饰器
  description: 页面组件和状态模型必须统一使用 @ObservedV2、@Trace、@ComponentV2、@Local、@Param、@Provider、@Consumer、@Monitor、@Computed 等 V2 装饰器体系，禁止继续使用旧版 @State、@Link、@ObjectLink 等状态管理写法。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-PERF-002-05-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@(?:ObservedV2|ComponentV2|Local|Param|Provider|Consumer|Monitor|Computed|Trace)\\b'
    - rule_id: HM-PERF-002-05-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_not_contains
      pattern: '@(?:State|Link|ObjectLink|Prop|Provide|Consume|StorageLink|StorageProp|Watch)\\b'
