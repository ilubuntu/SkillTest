id: compilable_002
skill_type: compilable
title: "生成可编译的Form表单代码"

input:
  prompt: "请生成一个包含TextInput和Button组件的ArkTS表单页面，要求代码可以通过ArkTS编译器检查"
  code_file: cases/002/input.ets

expected:
  reference_file: cases/002/input.ets
  must_contain:
    - "@Entry"
    - "@Component"
    - "TextInput"
    - "Button"
    - "@State"
  must_not_contain:
    - "any"
    - "var "
  rubric:
    - name: correctness
      weight: 40
      criteria: "代码是否正确实现了表单组件，事件处理是否正确"
    - name: completeness
      weight: 30
      criteria: "是否包含完整的输入验证和表单提交逻辑"
    - name: code_quality
      weight: 30
      criteria: "代码是否符合ArkTS类型系统要求，状态管理是否规范"
