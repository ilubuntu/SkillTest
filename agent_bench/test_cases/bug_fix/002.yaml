id: bug_fix_002
category: specialized
scenario: bug_fix
title: "State数组修改未触发UI刷新"
input:
  prompt: "以下ArkTS代码中，点击添加按钮后新增的数据不会显示在界面上，请修复"
  code_file: cases/002/input.ets
expected:
  reference_file: cases/002/expected.ets
  must_contain:
    - "...this"
  must_not_contain:
    - "this.items.push("
  compile_check: false
  rubric:
    - name: correctness
      weight: 40
      criteria: "是否通过重新赋值数组来触发@State的UI刷新"
    - name: completeness
      weight: 30
      criteria: "是否同时修复了所有直接修改数组的地方"
    - name: code_quality
      weight: 30
      criteria: "代码简洁，符合ArkTS状态管理最佳实践"
