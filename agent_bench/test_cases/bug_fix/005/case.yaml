case:
  id: bug_fix_005
  scenario: bug_fix
  title: 修复新闻模板场景中的新闻图片加载失败问题
  prompt: 这是一个缺陷修复任务。修复新闻详情页中图片加载失败没有兜底的问题。当前新闻详情页中的图片直接依赖在线图片地址，当网络异常时出现空白区域，没有任何失败反馈。。请修复缺陷，保持现有业务结构稳定。
  output_requirements: 请直接在当前工程中修改代码并修复缺陷，工程需可编译，并在回复中说明根因、修复点和修改文件。
constraints:
- id: HM-BUGFIX-005-01
  name: 需要处理图片加载失败回调，提供onError处理
  description: 需要处理图片加载失败回调，提供onError处理
  priority: P0
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: call
      name: Image
    - type: property_access
      name: onError
    llm: 检查Image组件是否正确处理了onError回调
- id: HM-BUGFIX-005-02
  name: 失败时仍应保留正文内容和其他交互元素
  description: 失败时仍应保留正文内容和其他交互元素
  priority: P1
  rules:
  - target: '**/pages/*.ets'
    ast:
    - type: call
      name: Text
    llm: 检查图片加载失败时，正文内容和其他交互元素是否正常显示
