schema: case-spec/v1
version: 1

case:
  id: bug_fix_005
  scenario: bug_fix
  title: "【应用列表】EventHub事件名不匹配与ForEach keyGenerator缺失修复"

project:
  type: HarmonyOS ArkTS
  project_dir: original_project
  summary: >
    这是一个应用列表展示工程。首页以网格形式展示应用图标，
    点击切换入口进入显示设置页，可选择网格形式或列表形式，
    切换后返回首页，应用展示形式应同步切换。

problem:
  summary: >
    当前工程存在三个问题：1）AppDisplayPage使用eventhub.on监听了'modeChange'事件，
    而SettingsPage发送的事件名是'displayModeChange'，事件名不匹配导致切换无效；
    2）ForEach未指定keyGenerator参数，可能导致列表渲染性能问题；
    3）eventhub.on订阅后未在aboutToDisappear中使用eventhub.off取消订阅，导致内存泄露。
  related_files:
    - original_project/entry/src/main/ets/pages/Index.ets
    - original_project/entry/src/main/ets/pages/SettingsPage.ets
    - original_project/entry/src/main/resources/base/profile/main_pages.json
  expected_result:
    - 设置页切换网格/列表模式后，应用展示页同步切换
    - ForEach正确指定keyGenerator参数
    - eventhub.off正确取消订阅，防止内存泄露
    - 修复后的代码可供后续验证

agent:
  purpose: 测试 agent 在多页面场景下修复EventHub事件通信、订阅释放和ForEach性能问题的能力
  work_mode: 同时修复AppDisplayPage和SettingsPage中的EventHub事件名匹配、订阅释放和ForEach keyGenerator问题
  output_requirements:
    - 修改了哪些文件
    - 每个文件的主要修改内容
    - 修复后达到了什么效果

constraints:
  - id: HM-BUGFIX-005-01
    name: EventHub事件名必须统一定义并严格匹配
    description: 事件发送端与监听端必须复用同一事件名常量，禁止字符串硬编码不一致导致模式切换失效。
    category: 可靠性
    priority: P0
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-005-01-R1
          target_file: original_project/entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "const\\s+\\w+\\s*:\\s*string\\s*=\\s*['\"]displayModeChange['\"]"
        - rule_id: HM-BUGFIX-005-01-R2
          target_file: original_project/entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_contains
          pattern: "const\\s+\\w+\\s*:\\s*string\\s*=\\s*['\"]displayModeChange['\"]"
        - rule_id: HM-BUGFIX-005-01-R3
          target_file: original_project/entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "getEventHub\\(\\)\\?\\.on\\(\\s*\\w+\\s*,\\s*this\\.\\w+\\s*\\)"
        - rule_id: HM-BUGFIX-005-01-R4
          target_file: original_project/entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_count_at_least
          pattern: "getEventHub\\(\\)\\?\\.emit\\(\\s*\\w+\\s*,\\s*new\\s+\\w+\\(\\s*['\"](?:grid|list)['\"]\\s*\\)\\s*\\)"
          count: 2
  - id: HM-BUGFIX-005-02
    name: EventHub订阅必须在页面销毁时解除
    description: 使用eventhub.on注册的回调必须在aboutToDisappear或等效生命周期中调用eventhub.off释放，防止重复订阅和内存泄漏。
    category: 可靠性
    priority: P2
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-005-02-R1
          target_file: original_project/entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "aboutToDisappear\\s*\\(\\)\\s*\\{"
        - rule_id: HM-BUGFIX-005-02-R2
          target_file: original_project/entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "getEventHub\\(\\)\\?\\.off\\(\\s*\\w+\\s*,\\s*this\\.\\w+\\s*\\)"
  - id: HM-BUGFIX-005-03
    name: ForEach必须提供稳定keyGenerator
    description: Grid和List中的ForEach都必须提供稳定且唯一的keyGenerator，避免列表切换或重排时出现性能退化和状态错乱。
    category: 性能
    priority: P2
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-005-03-R1
          target_file: original_project/entry/src/main/ets/pages/Index.ets
          match_type: regex_count_at_least
          pattern: "ForEach\\([\\s\\S]{0,400}?\\,\\s*\\([^)]*\\)\\s*=>\\s*[A-Za-z_][A-Za-z0-9_\\.]*\\s*\\)"
          count: 2
  - id: HM-BUGFIX-005-04
    name: 显示模式切换必须驱动首页视图同步更新
    description: 设置页切换网格或列表模式后，首页必须根据事件载荷立即切换布局，不允许仅更新本页状态。
    category: 组件规范
    priority: P1
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-005-04-R1
          target_file: original_project/entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "isGridMode\\s*=\\s*\\w+\\.mode\\s*===\\s*['\"]grid['\"]"
        - rule_id: HM-BUGFIX-005-04-R2
          target_file: original_project/entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_contains
          pattern: "new\\s+\\w+\\(\\s*['\"]grid['\"]\\s*\\)"
        - rule_id: HM-BUGFIX-005-04-R3
          target_file: original_project/entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_contains
          pattern: "new\\s+\\w+\\(\\s*['\"]list['\"]\\s*\\)"
