schema: case-spec/v1
version: 1

case:
  id: bug_fix_005
  scenario: bug_fix
  title: "【应用列表】EventHub事件名不匹配与ForEach keyGenerator缺失修复"

project:
  type: HarmonyOS ArkTS
  project_dir: original_project
  summary: >
    这是一个应用列表展示工程。首页以网格形式展示应用图标，
    点击切换入口进入显示设置页，可选择网格形式或列表形式，
    切换后返回首页，应用展示形式应同步切换。

problem:
  summary: >
    当前工程存在三个问题：1）AppDisplayPage使用eventhub.on监听了'modeChange'事件，
    而SettingsPage发送的事件名是'displayModeChange'，事件名不匹配导致切换无效；
    2）ForEach未指定keyGenerator参数，可能导致列表渲染性能问题；
    3）eventhub.on订阅后未在aboutToDisappear中使用eventhub.off取消订阅，导致内存泄露。
  related_files:
    - baseline/AppDisplayPage_baseline.ets
    - baseline/SettingsPage_baseline.ets
    - enhanced/AppDisplayPage_enhanced.ets
    - enhanced/SettingsPage_enhanced.ets
  expected_result:
    - 设置页切换网格/列表模式后，应用展示页同步切换
    - ForEach正确指定keyGenerator参数
    - eventhub.off正确取消订阅，防止内存泄露
    - 修复后的代码可供后续验证

agent:
  purpose: 测试 agent 在多页面场景下修复EventHub事件通信、订阅释放和ForEach性能问题的能力
  work_mode: 同时修复AppDisplayPage和SettingsPage中的EventHub事件名匹配、订阅释放和ForEach keyGenerator问题
  output_requirements:
    - 修改了哪些文件
    - 每个文件的主要修改内容
    - 修复后达到了什么效果

constraints:
  - 保持现有业务流程不变
  - 最小必要修改
  - EventHub事件名必须匹配
