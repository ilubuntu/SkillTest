id: bug_fix_003
category: specialized
scenario: bug_fix
title: "组件销毁后定时器未清除导致内存泄漏"
input:
  prompt: "以下ArkTS代码中，组件使用了setInterval定时刷新数据，但页面退出后定时器仍在运行导致内存泄漏，请修复"
  code_file: cases/003/input.ets
expected:
  reference_file: cases/003/expected.ets
  must_contain:
    - "clearInterval"
    - "aboutToDisappear"
  must_not_contain: []
  compile_check: false
  rubric:
    - name: correctness
      weight: 40
      criteria: "是否在aboutToDisappear中调用clearInterval清除定时器"
    - name: completeness
      weight: 30
      criteria: "是否保存了setInterval返回值，是否处理了组件销毁后的异步回调"
    - name: code_quality
      weight: 30
      criteria: "代码结构合理，生命周期管理规范"
