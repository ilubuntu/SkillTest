case:
  id: bug_fix_001
  scenario: bug_fix
  title: 商品列表与详情编辑工程缺陷修复
  prompt: 这是一个商品管理工程，首页展示商品列表（Index.ets），点击添加进入修改添加商品页面（DetailPage.ets），当前添加商品后首页列表不更新。
  output_requirements: 请修复，直接在当前工程中修改代码,并说明修改了哪些文件

constraints:
  - id: HM-BUGFIX-001-01
    name: 新增或编辑后必须同步刷新商品列表
    description: 保存成功后必须将商品变更结果回传首页，并按商品ID执行新增或更新，避免列表展示旧数据或出现重复数据。
    priority: P0
    rules:
      - rule_id: HM-BUGFIX-001-01-R1-AST
        target_file: entry/src/main/ets/pages/Index.ets
        match_type: ast
        rule_name: handles_router_params_and_updates_list
        params: {}
      - rule_id: HM-BUGFIX-001-01-R1-LLM
        target_file: entry/src/main/ets/pages/Index.ets
        match_type: llm
        rule_name: handles_router_params_and_updates_list
        params: {}
      - rule_id: HM-BUGFIX-001-01-R2-AST
        target_file: entry/src/main/ets/pages/DetailPage.ets
        match_type: ast
        rule_name: uses_router_back_with_params
        params: {}
      - rule_id: HM-BUGFIX-001-01-R2-LLM
        target_file: entry/src/main/ets/pages/DetailPage.ets
        match_type: llm
        rule_name: uses_router_back_with_params
        params: {}
  - id: HM-BUGFIX-001-02
    name: 商品表单必须进行有效性校验
    description: 保存前必须校验商品名称非空且价格为大于0的有效数值，非法输入应阻断提交并给出明确提示。
    priority: P2
    rules:
      - rule_id: HM-BUGFIX-001-02-R1-AST
        target_file: entry/src/main/ets/pages/DetailPage.ets
        match_type: ast
        rule_name: validates_form_input
        params:
          fields:
            - name
            - price
      - rule_id: HM-BUGFIX-001-02-R1-LLM
        target_file: entry/src/main/ets/pages/DetailPage.ets
        match_type: llm
        rule_name: validates_form_input
        params:
          fields:
            - name
            - price
  - id: HM-BUGFIX-001-03
    name: 异步保存失败必须恢复交互状态并提示
    description: 数据更新失败时必须结束保存态、恢复按钮可点击状态，并向用户展示失败原因，避免页面卡死或无反馈。
    priority: P0
    rules:
      - rule_id: HM-BUGFIX-001-03-R1-AST
        target_file: entry/src/main/ets/pages/DetailPage.ets
        match_type: ast
        rule_name: handles_async_save_error
        params: {}
      - rule_id: HM-BUGFIX-001-03-R1-LLM
        target_file: entry/src/main/ets/pages/DetailPage.ets
        match_type: llm
        rule_name: handles_async_save_error
        params: {}
  - id: HM-BUGFIX-001-04
    name: 编辑态必须正确回填商品详情
    description: 进入详情编辑页时必须依据商品ID加载已有数据并回填表单，避免编辑页展示默认值或覆盖原始数据。
    priority: P0
    rules:
      - rule_id: HM-BUGFIX-001-04-R1-AST
        target_file: entry/src/main/ets/pages/DetailPage.ets
        match_type: ast
        rule_name: loads_and_fills_existing_goods_data
        params: {}
      - rule_id: HM-BUGFIX-001-04-R1-LLM
        target_file: entry/src/main/ets/pages/DetailPage.ets
        match_type: llm
        rule_name: loads_and_fills_existing_goods_data
        params: {}