case:
  id: bug_fix_003
  scenario: bug_fix
  title: "应用列表展示模式切换后不展示对应模式效果"
  prompt: 这是一个应用列表展示工程。首页以网格形式展示应用图标，点击切换入口进入显示设置页，可选择网格形式或列表形式，切换后返回首页，应用显示形式应同步切换。
  output_requirements: 请修复，直接在当前工程中修改代码，并说明修改了哪些文件、每个文件的主要修改内容，以及修复后达到的效果

constraints:
  - id: HM-BUGFIX-003-01
    name: EventHub订阅必须在页面销毁时解除
    description: 使用eventhub.on注册的回调必须在aboutToDisappear或等效生命周期中调用eventhub.off释放，防止重复订阅和内存泄漏。
    category: 可靠性
    priority: P2
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-003-01-R1
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "aboutToDisappear\\s*\\(\\)\\s*\\{"
        - rule_id: HM-BUGFIX-003-01-R2
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "getEventHub\\(\\)\\?\\.off\\(\\s*\\w+\\s*,\\s*this\\.\\w+\\s*\\)"
  - id: HM-BUGFIX-003-02
    name: ForEach必须提供稳定keyGenerator
    description: Grid和List中的ForEach都必须提供稳定且唯一的keyGenerator，避免列表切换或重排时出现性能退化和状态错乱。
    category: 性能
    priority: P2
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-003-02-R1
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_count_at_least
          pattern: "ForEach\\([\\s\\S]{0,400}?\\,\\s*\\([^)]*\\)\\s*=>\\s*[A-Za-z_][A-Za-z0-9_\\.]*\\s*\\)"
          count: 2
  - id: HM-BUGFIX-003-03
    name: 显示模式切换必须驱动首页视图同步更新
    description: 设置页切换网格或列表模式后，首页必须根据事件载荷立即切换布局，不允许仅更新本页状态。
    category: 组件规范
    priority: P1
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-003-03-R1
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "isGridMode\\s*=\\s*\\w+\\.mode\\s*===\\s*['\"]grid['\"]"
        - rule_id: HM-BUGFIX-003-03-R2
          target_file: entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_contains
          pattern: "new\\s+\\w+\\(\\s*['\"]grid['\"]\\s*\\)"
        - rule_id: HM-BUGFIX-003-03-R3
          target_file: entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_contains
          pattern: "new\\s+\\w+\\(\\s*['\"]list['\"]\\s*\\)"
  - id: HM-BUGFIX-003-04
    name: 页面状态管理必须统一使用 V2 装饰器
    description: 页面组件和状态模型必须统一使用 @ObservedV2、@Trace、@ComponentV2、@Local、@Param、@Provider、@Consumer、@Monitor、@Computed 等 V2 装饰器体系，禁止继续使用旧版 @State、@Link、@ObjectLink 等状态管理写法。
    category: 生态规范
    priority: P0
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-003-04-R1
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "@(?:ObservedV2|ComponentV2|Local|Param|Provider|Consumer|Monitor|Computed|Trace)\\b"
        - rule_id: HM-BUGFIX-003-04-R2
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_not_contains
          pattern: "@(?:State|Link|ObjectLink|Prop|Provide|Consume|StorageLink|StorageProp|Watch)\\b"
        - rule_id: HM-BUGFIX-003-04-R3
          target_file: entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_not_contains
          pattern: "@(?:State|Link|ObjectLink|Prop|Provide|Consume|StorageLink|StorageProp|Watch)\\b"
  - id: HM-BUGFIX-003-05
    name: 页面路由管理必须统一使用 Navigation
    description: 页面路由必须统一使用 Navigation + NavPathStack / NavDestination 等声明式导航能力，禁止继续使用旧版 router。
    category: 生态规范
    priority: P0
    check_method:
      type: custom_rule
      match_mode: all
      rules:
        - rule_id: HM-BUGFIX-003-05-R1
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "Navigation\\s*\\("
        - rule_id: HM-BUGFIX-003-05-R2
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "NavPathStack\\s*=\\s*new\\s+NavPathStack\\s*\\("
        - rule_id: HM-BUGFIX-003-05-R3
          target_file: entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_contains
          pattern: "NavDestination\\s*\\("
        - rule_id: HM-BUGFIX-003-05-R4
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_not_contains
          pattern: "\\brouter\\."
        - rule_id: HM-BUGFIX-003-05-R5
          target_file: entry/src/main/ets/pages/SettingsPage.ets
          match_type: regex_not_contains
          pattern: "\\brouter\\."
