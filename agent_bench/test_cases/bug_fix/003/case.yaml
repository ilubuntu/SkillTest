case:
  id: bug_fix_003
  scenario: bug_fix
  title: "应用列表展示模式切换后不展示对应模式效果"
  prompt: 这是一个应用列表展示工程。首页以网格形式展示应用图标，点击切换入口进入显示设置页，可选择网格形式或列表形式，切换后返回首页，应用显示形式应同步切换。
  output_requirements: 请修复，直接在当前工程中修改代码，并说明修改了哪些文件、每个文件的主要修改内容，以及修复后达到的效果

constraints:
  - id: HM-BUGFIX-003-01
    name: EventHub订阅必须在页面销毁时解除
    description: 使用eventhub.on注册的回调必须在aboutToDisappear或等效生命周期中调用eventhub.off释放，防止重复订阅和内存泄漏。
    priority: P2
    check_method:
      rules:
        - rule_id: HM-BUGFIX-003-01-R1
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "aboutToDisappear\\s*\\(\\)\\s*\\{"
        - rule_id: HM-BUGFIX-003-01-R2
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "getEventHub\\(\\)\\?\\.off\\(\\s*\\w+\\s*,\\s*this\\.\\w+\\s*\\)"
  - id: HM-BUGFIX-003-02
    name: ForEach必须提供稳定keyGenerator
    description: Grid和List中的ForEach都必须提供稳定且唯一的keyGenerator，避免列表切换或重排时出现性能退化和状态错乱。
    priority: P2
    check_method:
      rules:
        - rule_id: HM-BUGFIX-003-02-R1
          target_file: entry/src/main/ets/pages/Index.ets
          match_type: regex_contains
          pattern: "ForEach\\([\\s\\S]{0,400}?\\,\\s*\\([^)]*\\)\\s*=>\\s*[A-Za-z_][A-Za-z0-9_\\.]*\\s*\\)"
