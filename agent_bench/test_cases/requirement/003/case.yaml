case:
  id: requirement_003
  scenario: requirement
  title: 实现评论列表点赞需求
  prompt: 这是一个基础组件类需求。请基于当前 HarmonyOS 工程实现一个评论列表页面，每条评论展示头像占位、昵称、评论内容和点赞数。评论数据模型需要使用 @ObservedV2 定义，并使用 @Trace 标注点赞状态与点赞数，确保点击点赞后只更新当前评论项的状态与计数，不依赖旧版 @State。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，主入口保持在 entry/src/main/ets/pages/Index.ets，并在回复中说明评论模型、列表渲染和点赞交互的实现方式。
constraints:
- id: HM-REQ-003-01
  name: 评论项布局必须具备手机和平板适配能力
  description: 评论项应通过 GridRow 和 GridCol 等栅格布局组织头像、正文和操作区，保证在手机和平板上都能稳定排版。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-003-01-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: GridRow(
    - rule_id: HM-REQ-003-01-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: GridCol(
    - rule_id: HM-REQ-003-01-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '(?:xs|sm|md|lg)\s*:'
- id: HM-REQ-003-02
  name: 评论项接口必须同时开放数据与交互回调
  description: 评论项组件接口应接收评论数据对象和点赞交互回调，便于在不同评论流或不同交互策略下复用。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-003-02-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+(?:comment|item|data)\s*:\s*\w+'
    - rule_id: HM-REQ-003-02-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+\w*(?:onLike|onToggleLike|onAction)\s*:\s*\([^)]*\)\s*=>'
- id: HM-REQ-003-03
  name: 评论项必须开放可扩展操作区接口
  description: 评论项组件应提供可插拔的扩展操作区接口，以满足更多互动按钮、徽标或底部说明等定制需求。
  priority: P1
  check_method:
    rules:
    - rule_id: HM-REQ-003-03-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@BuilderParam\s+\w*(?:actionBuilder|footerBuilder|extraBuilder)'
    - rule_id: HM-REQ-003-03-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: 'this\.\w*(?:actionBuilder|footerBuilder|extraBuilder)\s*\('
- id: HM-REQ-003-04
  name: 页面路由管理必须统一使用 Navigation
  description: 页面路由必须统一使用 Navigation + NavPathStack / NavDestination 等声明式导航能力，禁止继续使用旧版 router。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-003-04-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: Navigation\s*\(
    - rule_id: HM-REQ-003-04-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: NavPathStack\s*=\s*new\s+NavPathStack\s*\(
    - rule_id: HM-REQ-003-04-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_not_contains
      pattern: \brouter\.
