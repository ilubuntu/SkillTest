case:
  id: requirement_003
  scenario: requirement
  title: 实现评论列表点赞需求
  prompt: 这是一个基础组件类需求。请基于当前 HarmonyOS 工程实现一个评论列表页面，每条评论展示头像占位、昵称、评论内容和点赞数。评论数据模型需要使用 @ObservedV2 定义，并使用 @Trace 标注点赞状态与点赞数，确保点击点赞后只更新当前评论项的状态与计数，不依赖旧版 @State。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，主入口保持在 entry/src/main/ets/pages/Index.ets，并在回复中说明评论模型、列表渲染和点赞交互的实现方式。
constraints:
- id: HM-REQ-003-01
  name: 评论模型必须使用 @ObservedV2 和 @Trace
  description: 评论数据模型需要使用 @ObservedV2 定义，并对 liked 与 likedCount 使用 @Trace 标注。
  category: 响应式
  priority: P0
  check_method:
    type: custom_rule
    match_mode: all
    rules:
    - rule_id: HM-REQ-003-01-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: '@ObservedV2'
    - rule_id: HM-REQ-003-01-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Trace\s+liked\s*:\s*boolean'
    - rule_id: HM-REQ-003-01-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Trace\s+likedCount\s*:\s*number'
- id: HM-REQ-003-02
  name: 页面必须渲染评论列表
  description: 页面主体需要通过列表渲染多个评论项，而不是只写单条静态内容。
  category: 组件规范
  priority: P0
  check_method:
    type: custom_rule
    match_mode: all
    rules:
    - rule_id: HM-REQ-003-02-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: ForEach\(\s*this\.(?:comments|commentList)
    - rule_id: HM-REQ-003-02-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_count_at_least
      pattern: Text\(
      count: 3
- id: HM-REQ-003-03
  name: 点赞交互必须更新当前评论项状态
  description: 点击点赞后应切换 liked，并同步增减 likedCount。
  category: 交互
  priority: P1
  check_method:
    type: custom_rule
    match_mode: all
    rules:
    - rule_id: HM-REQ-003-03-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: (?:comment|item)\.liked\s*=\s*!\s*(?:comment|item)\.liked
    - rule_id: HM-REQ-003-03-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: (?:comment|item)\.likedCount\s*(?:\+\+|--|=)
- id: HM-REQ-003-04
  name: 页面路由管理必须统一使用 Navigation
  description: 页面路由必须统一使用 Navigation + NavPathStack / NavDestination 等声明式导航能力，禁止继续使用旧版 router。
  category: 生态规范
  priority: P0
  check_method:
    type: custom_rule
    match_mode: all
    rules:
    - rule_id: HM-REQ-003-04-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: Navigation\s*\(
    - rule_id: HM-REQ-003-04-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: NavPathStack\s*=\s*new\s+NavPathStack\s*\(
    - rule_id: HM-REQ-003-04-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_not_contains
      pattern: \brouter\.
- id: HM-REQ-003-05
  name: 页面状态管理必须统一使用 V2 装饰器
  description: 页面组件和状态模型必须统一使用 @ObservedV2、@Trace、@ComponentV2、@Local、@Param、@Provider、@Consumer、@Monitor、@Computed 等 V2 装饰器体系，禁止继续使用旧版 @State、@Link、@ObjectLink 等状态管理写法。
  category: 生态规范
  priority: P0
  check_method:
    type: custom_rule
    match_mode: all
    rules:
    - rule_id: HM-REQ-003-05-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@(?:ObservedV2|ComponentV2|Local|Param|Provider|Consumer|Monitor|Computed|Trace)\\b'
    - rule_id: HM-REQ-003-05-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_not_contains
      pattern: '@(?:State|Link|ObjectLink|Prop|Provide|Consume|StorageLink|StorageProp|Watch)\\b'
