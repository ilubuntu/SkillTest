case:
  id: requirement_003
  scenario: requirement
  title: 评论列表功能开发，支持评论点赞
  prompt: 请基于当前HarmonyOS工程实现一个通用的评论列表功能。首页应作为评论列表入口页，点击后进入新的评论列表页面；在评论列表页面中，每条评论展示头像占位、昵称、评论内容和点赞数，点赞或取消点赞后，需要立即更新当前评论项的点赞状态与点赞数。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，主入口保持在 entry/src/main/ets/pages/Index.ets，评论列表在新页面中展示。
constraints:
- id: HM-REQ-003-01
  name: 点赞或取消点赞只能作用于当前评论项
  description: 用户点击某条评论的点赞区域后，只能更新该条评论自身的点赞状态与点赞数，不能连带影响其他评论项。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-003-01-R1
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '(?:findIndex|map)\s*\('
    - rule_id: HM-REQ-003-01-R2
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '(?:\w+\.)?id\s*===\s*(?:\w+\.)?id|(?:commentId|itemId|targetId|currentId)'
    - rule_id: HM-REQ-003-01-R3
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '(?:liked|isLiked)\s*[:=]\s*!\s*(?:\w+\.)?(?:liked|isLiked)'
    - rule_id: HM-REQ-003-01-R4
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '(?:likeCount|likes)\s*[:=]\s*(?:\(?\s*(?:\w+\.)?(?:likeCount|likes)\s*[+-]\s*1|\w+\s*\?\s*(?:\w+\.)?(?:likeCount|likes)\s*-\s*1\s*:\s*(?:\w+\.)?(?:likeCount|likes)\s*\+\s*1)'
- id: HM-REQ-003-02
  name: 点赞区域必须具备足够可点击热区
  description: 点赞入口不能只依赖难以命中的小图标或小文字，应提供足够的点击热区，保证用户容易点击和操作。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-003-02-R1
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '(?:Button\s*\(|\.onClick\s*\()'
    - rule_id: HM-REQ-003-02-R2
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '\.(?:width|height|size|constraintSize)\s*\(\s*(?:4\d|[5-9]\d|\d{3,})'
    - rule_id: HM-REQ-003-02-R3
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '\.padding\s*\(\s*(?:\{[^}]*?(?:left|right|top|bottom)\s*:\s*(?:8|9|[1-9]\d)|(?:8|9|[1-9]\d))'
- id: HM-REQ-003-03
  name: 页面具备基础一多适配能力
  description: 评论列表页面在手机与平板等不同设备上应保持基本可用的排版能力，不能只针对单一窄屏布局硬编码。
  priority: P1
  check_method:
    rules:
    - rule_id: HM-REQ-003-03-R1
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: contains
      snippet: GridRow(
    - rule_id: HM-REQ-003-03-R2
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: contains
      snippet: GridCol(
    - rule_id: HM-REQ-003-03-R3
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '(?:xs|sm|md|lg)\s*:'
- id: HM-REQ-003-04
  name: 评论列表应抽象为可复用组件
  description: 评论列表不应全部直接堆叠在页面入口中实现，而应抽象出独立组件承接列表渲染，便于后续复用与演进。
  priority: P1
  check_method:
    rules:
    - rule_id: HM-REQ-003-04-R1
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '@Component(?:V2)?'
    - rule_id: HM-REQ-003-04-R2
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: 'struct\s+\w*(?:CommentList|CommentsList|CommentSection|CommentPanel)\w*'
    - rule_id: HM-REQ-003-04-R3
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '\w*(?:CommentList|CommentsList|CommentSection|CommentPanel)\w*\s*\('
- id: HM-REQ-003-05
  name: 评论较多时应具备基础性能优化能力
  description: 评论列表应考虑评论数量较多时的渲染与滚动性能，避免采用明显不利于长列表场景的直接堆叠式渲染方式。
  priority: P1
  check_method:
    rules:
    - rule_id: HM-REQ-003-05-R1
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '(?:List\s*\(|LazyForEach\s*\(|ForEach\s*\()'
    - rule_id: HM-REQ-003-05-R2
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_contains
      pattern: '(?:cachedCount\s*\(|LazyForEach\s*\(|keyGenerator|,\s*\(\s*\w+\s*:\s*\w+\s*\)\s*=>\s*\w+\.(?:id|commentId)\.?(?:toString\s*\(\))?)'
    - rule_id: HM-REQ-003-05-R3
      target_file: entry/src/main/ets/pages/CommentListPage.ets
      match_type: regex_not_contains
      pattern: 'Column\s*\(\s*\)\s*\{[\s\S]{0,400}ForEach\s*\('
