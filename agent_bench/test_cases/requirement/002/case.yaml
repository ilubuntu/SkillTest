case:
  id: requirement_002
  scenario: requirement
  title: 实现商品详情卡片展示需求
  prompt: 这是一个基础组件类需求。请基于当前 HarmonyOS 工程实现一个商品详情展示页。页面中需要包含一个商品卡片子组件，用于展示商品标题、价格和标签列表；标题、价格和标签数据必须由父组件传入，子组件使用 @Param 接收这些核心数据，并保持只读展示职责，不允许在子组件内部修改参数值。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，主入口保持在 entry/src/main/ets/pages/Index.ets，并在回复中说明父组件如何传参、子组件如何展示。
constraints:
- id: HM-REQ-002-01
  name: 商品卡片布局必须具备手机和平板适配能力
  description: 商品卡片应采用 GridRow 和 GridCol 等栅格布局组织内容，确保在手机和平板上都能保持稳定排版。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-002-01-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: GridRow(
    - rule_id: HM-REQ-002-01-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: GridCol(
    - rule_id: HM-REQ-002-01-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '(?:xs|sm|md|lg)\s*:'
- id: HM-REQ-002-02
  name: 商品卡片接口必须同时支持核心数据和展示配置
  description: 商品卡片组件接口除了接收商品核心数据外，还应提供展示配置参数，便于在不同商品场景中复用同一套卡片组件。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-002-02-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+(?:product|item|data)\s*:\s*\w+'
    - rule_id: HM-REQ-002-02-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+(?:options|displayOptions|layoutOptions|config)\s*\??\s*:\s*\w+'
    - rule_id: HM-REQ-002-02-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: ProductCard\s*\(
- id: HM-REQ-002-03
  name: 商品卡片必须开放可扩展内容接口
  description: 商品卡片组件应提供可插拔的扩展区域或构建器接口，以支持不同业务定制标签区、底部操作区或附加说明。
  priority: P1
  check_method:
    rules:
    - rule_id: HM-REQ-002-03-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@BuilderParam\s+\w*(?:tagBuilder|footerBuilder|extraBuilder|actionBuilder)'
    - rule_id: HM-REQ-002-03-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: 'this\.\w*(?:tagBuilder|footerBuilder|extraBuilder|actionBuilder)\s*\('
