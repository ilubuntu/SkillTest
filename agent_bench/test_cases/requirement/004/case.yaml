case:
  id: requirement_004
  scenario: requirement
  title: 实现注册表单实时校验需求
  prompt: 这是一个基础组件类需求。请基于当前 HarmonyOS 工程实现一个注册表单页面，包含手机号输入框和验证码输入框，并对输入内容进行实时校验。请使用 V2 装饰器体系组织页面状态，通过 @Computed 派生表单是否可提交的结果，并据此联动提交按钮状态；不需要引入冗余的 @Monitor。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，主入口保持在 entry/src/main/ets/pages/Index.ets，并在回复中说明实时校验和 @Computed 的实现方式。
constraints:
- id: HM-REQ-004-01
  name: 注册页布局必须具备手机和平板适配能力
  description: 注册页应通过 GridRow 和 GridCol 等栅格布局组织表单内容，保证在手机和平板上都能保持稳定的输入区和操作区布局。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-004-01-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: GridRow(
    - rule_id: HM-REQ-004-01-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: GridCol(
    - rule_id: HM-REQ-004-01-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '(?:xs|sm|md|lg)\s*:'
- id: HM-REQ-004-02
  name: 注册表单接口必须由字段与校验规则配置驱动
  description: 注册表单组件应通过字段配置和校验规则接口驱动输入项与验证逻辑，便于扩展到更多注册或认证场景。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-004-02-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+\w*(?:fields|items|configs)\s*:\s*(?:Array<|ReadonlyArray<)'
    - rule_id: HM-REQ-004-02-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+\w*(?:rules|validators|validatorMap)\s*:\s*(?:Array<|Record<|\w+)'
    - rule_id: HM-REQ-004-02-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: 'ForEach\(\s*this\.\w*(?:fields|items|configs)'
- id: HM-REQ-004-03
  name: 提交能力与派生校验结果接口必须支持定制
  description: 注册表单组件应通过派生校验结果控制可提交状态，并开放按钮文案与提交回调接口，便于适配不同注册流程。
  priority: P1
  check_method:
    rules:
    - rule_id: HM-REQ-004-03-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Computed\s+\w+\s*\('
    - rule_id: HM-REQ-004-03-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+\w*(?:submitText|buttonText)\s*:\s*string'
    - rule_id: HM-REQ-004-03-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+\w*(?:onSubmit|submitAction)\s*:\s*\([^)]*\)\s*=>'
- id: HM-REQ-004-04
  name: 页面路由管理必须统一使用 Navigation
  description: 页面路由必须统一使用 Navigation + NavPathStack / NavDestination 等声明式导航能力，禁止继续使用旧版 router。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-004-04-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: Navigation\s*\(
    - rule_id: HM-REQ-004-04-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: NavPathStack\s*=\s*new\s+NavPathStack\s*\(
    - rule_id: HM-REQ-004-04-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_not_contains
      pattern: \brouter\.
