case:
  id: requirement_001
  scenario: requirement
  title: 实现快捷登录表单需求
  prompt: 这是一个基础组件类需求。请基于当前 HarmonyOS 工程实现一个快捷登录页。页面需要使用 TextInput 和 Button 构建登录表单，包含手机号输入框、密码输入框和密码明文/密文切换按钮；状态管理需统一使用 V2 装饰器体系，使用 @ComponentV2 和多个 @Local 管理输入值及密码显隐状态，禁止继续使用旧版 @State。提交按钮需要根据输入内容联动可用状态。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，主入口保持在 entry/src/main/ets/pages/Index.ets，并在回复中说明修改了哪些文件，以及关键实现点。
constraints:
- id: HM-REQ-001-01
  name: 登录页布局必须具备手机和平板适配能力
  description: 登录页应采用 GridRow 和 GridCol 等栅格布局能力，并通过断点配置适配手机与平板，不应写死为单一窄屏布局。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-001-01-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: GridRow(
    - rule_id: HM-REQ-001-01-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: contains
      snippet: GridCol(
    - rule_id: HM-REQ-001-01-R3
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '(?:xs|sm|md|lg)\s*:'
- id: HM-REQ-001-02
  name: 登录表单接口必须由字段配置驱动
  description: 登录表单组件应通过字段配置数组描述手机号、密码等输入项，而不是把字段结构硬编码在组件内部，方便复用到其他账号表单。
  priority: P0
  check_method:
    rules:
    - rule_id: HM-REQ-001-02-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+\w*(?:fields|items|configs)\s*:\s*(?:Array<|ReadonlyArray<)'
    - rule_id: HM-REQ-001-02-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: 'ForEach\(\s*this\.\w*(?:fields|items|configs)'
- id: HM-REQ-001-03
  name: 登录动作与文案接口必须支持定制
  description: 登录表单组件应开放按钮文案和提交回调等接口，满足不同登录入口、不同提交逻辑的复用需求。
  priority: P1
  check_method:
    rules:
    - rule_id: HM-REQ-001-03-R1
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+\w*(?:submitText|buttonText)\s*:\s*string'
    - rule_id: HM-REQ-001-03-R2
      target_file: entry/src/main/ets/pages/Index.ets
      match_type: regex_contains
      pattern: '@Param\s+\w*(?:onSubmit|submitAction)\s*:\s*\([^)]*\)\s*=>'
