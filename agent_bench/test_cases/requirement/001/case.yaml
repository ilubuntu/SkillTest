case:
  id: requirement_001
  scenario: requirement
  title: 实现快捷登录表单需求
  prompt: 这是一个基础组件类需求。请基于当前 HarmonyOS 工程实现一个快捷登录页。页面需要使用 TextInput 和 Button 构建登录表单，包含手机号输入框、密码输入框和密码明文/密文切换按钮；状态管理需统一使用 V2 装饰器体系，使用 @ComponentV2 和多个 @Local 管理输入值及密码显隐状态，禁止继续使用旧版 @State。提交按钮需要根据输入内容联动可用状态。
  output_requirements: 请直接在当前工程中修改代码并完成需求实现，页面需可编译，主入口保持在 entry/src/main/ets/pages/Index.ets，并在回复中说明修改了哪些文件，以及关键实现点。
constraints:
- id: HM-REQ-001-01
  name: 页面使用 V2 组件与本地状态
  description: 登录页应使用 @ComponentV2，并通过多个 @Local 字段管理输入值与密码显隐状态，不得保留 @State。
  priority: P0
  rules:
  - id: HM-REQ-001-01-R1
    file: entry/src/main/ets/pages/Index.ets
    contains: '@ComponentV2'
  - id: HM-REQ-001-01-R2
    file: entry/src/main/ets/pages/Index.ets
    regex_count_at_least: '@Local\s+'
    count: 3
  - id: HM-REQ-001-01-R3
    file: entry/src/main/ets/pages/Index.ets
    regex_not: '@State\s+'
- id: HM-REQ-001-02
  name: 登录表单包含双输入与密码显隐切换
  description: 页面需要包含手机号与密码输入框，并通过显隐状态在普通文本和密码输入类型之间切换。
  priority: P0
  rules:
  - id: HM-REQ-001-02-R1
    file: entry/src/main/ets/pages/Index.ets
    regex_count_at_least: TextInput\(
    count: 2
  - id: HM-REQ-001-02-R2
    file: entry/src/main/ets/pages/Index.ets
    regex: type\s*:\s*this\.showPassword\s*\?\s*InputType\.Normal\s*:\s*InputType\.Password
  - id: HM-REQ-001-02-R3
    file: entry/src/main/ets/pages/Index.ets
    regex: this\.showPassword\s*=\s*!\s*this\.showPassword
- id: HM-REQ-001-03
  name: 登录按钮与输入状态联动
  description: 当手机号或密码不满足要求时，登录按钮应处于不可点击状态。
  priority: P1
  rules:
  - id: HM-REQ-001-03-R1
    file: entry/src/main/ets/pages/Index.ets
    regex: Button\(
  - id: HM-REQ-001-03-R2
    file: entry/src/main/ets/pages/Index.ets
    regex: \.enabled\(
- id: HM-REQ-001-04
  name: 页面状态管理必须统一使用 V2 装饰器
  description: 页面组件和状态模型必须统一使用 @ObservedV2、@Trace、@ComponentV2、@Local、@Param、@Provider、@Consumer、@Monitor、@Computed 等 V2 装饰器体系，禁止继续使用旧版 @State、@Link、@ObjectLink 等状态管理写法。
  priority: P0
  rules:
  - id: HM-REQ-001-04-R1
    file: entry/src/main/ets/pages/Index.ets
    regex: '@(?:ObservedV2|ComponentV2|Local|Param|Provider|Consumer|Monitor|Computed|Trace)\\b'
  - id: HM-REQ-001-04-R2
    file: entry/src/main/ets/pages/Index.ets
    regex_not: '@(?:State|Link|ObjectLink|Prop|Provide|Consume|StorageLink|StorageProp|Watch)\\b'
- id: HM-REQ-001-05
  name: 页面路由管理必须统一使用 Navigation
  description: 页面路由必须统一使用 Navigation + NavPathStack / NavDestination 等声明式导航能力，禁止继续使用旧版 router。
  priority: P0
  rules:
  - id: HM-REQ-001-05-R1
    file: entry/src/main/ets/pages/Index.ets
    regex: Navigation\\s*\\(
  - id: HM-REQ-001-05-R2
    file: entry/src/main/ets/pages/Index.ets
    regex: NavPathStack\\s*=\\s*new\\s+NavPathStack\\s*\\(
  - id: HM-REQ-001-05-R3
    file: entry/src/main/ets/pages/Index.ets
    regex_not: \\brouter\\.
