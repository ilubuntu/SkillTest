id: project_gen_002
skill_type: project_gen
title: "生成ArkTS Navigation路由工程"

input:
  prompt: "请生成一个使用Navigation组件实现路由的ArkTS工程，包含主页、详情页和设置页"
  code_file: cases/002/input.ets

expected:
  reference_file: cases/002/input.ets
  must_contain:
    - "Navigation"
    - "NavRouter"
    - "pages/Index"
    - "pages/Detail"
    - "pages/Settings"
    - "router"
  must_not_contain:
    - "TODO"
    - "FIXME"
  rubric:
    - name: correctness
      weight: 40
      criteria: "是否正确实现了Navigation路由配置，路由表是否完整"
    - name: completeness
      weight: 30
      criteria: "是否包含所有三个页面的实现，路由跳转是否正确"
    - name: code_quality
      weight: 30
      criteria: "代码结构是否清晰，是否遵循ArkTS模块化规范"
