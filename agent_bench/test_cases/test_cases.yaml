# 测试用例总表
# 代码文件路径相对于 agent_bench/ 根目录

scenarios:
  # ── Bug Fix ──────────────────────────────────────────────────
  - id: scenario_001
    name: "Bug Fix"
    description: "诊断并修复ArkTS代码中的常见缺陷"
    difficulty: medium
    tags: [arkts, bug-fix]
    cases:
      - id: case_001
        case_id: bug_fix_001
        title: "List组件ForEach性能崩溃修复"
        category: specialized
        input_file: test_cases/bug_fix/001/input.ets
        expected_file: test_cases/bug_fix/001/expected.ets
        prompt: "以下ArkTS代码在List组件中使用ForEach渲染大量数据，快速滑动时会崩溃，请修复"

      - id: case_002
        case_id: bug_fix_002
        title: "State数组修改未触发UI刷新"
        category: specialized
        input_file: test_cases/bug_fix/002/input.ets
        expected_file: test_cases/bug_fix/002/expected.ets
        prompt: "以下ArkTS代码中，点击添加按钮后新增的数据不会显示在界面上，请修复"

      - id: case_003
        case_id: bug_fix_003
        title: "组件销毁后定时器未清除导致内存泄漏"
        category: specialized
        input_file: test_cases/bug_fix/003/input.ets
        expected_file: test_cases/bug_fix/003/expected.ets
        prompt: "以下ArkTS代码中，组件使用了setInterval定时刷新数据，但页面退出后定时器仍在运行导致内存泄漏，请修复"

      - id: case_004
        case_id: bug_fix_004
        title: "【适老化】@ObservedV2类中@Trace缺失导致PersistentStorage更新不刷新UI"
        category: specialized
        input_file: test_cases/bug_fix/004/baseline/SettingsPage_baseline.ets
        expected_file: test_cases/bug_fix/004/enhanced/SettingsPage_enhanced.ets
        prompt: "以下ArkTS代码中，@ObservedV2类的fontSize属性缺少@Trace修饰，导致PersistentStorage持久化的对象属性变更时，预览区字体大小和大小数字文本不刷新，请修复。注意：这是一个多页面场景，存在两个页面：SettingsPage（设置页面，含\"字体大小\"入口）和FontSettingPage（字体设置页面，含Slider调节）。请同时修复这两个页面中缺失的@Trace修饰"

      - id: case_005
        case_id: bug_fix_005
        title: "【应用列表】EventHub事件监听缺失与内存泄露修复"
        category: specialized
        input_file: test_cases/bug_fix/005/baseline/AppDisplayPage_baseline.ets
        expected_file: test_cases/bug_fix/005/enhanced/AppDisplayPage_enhanced.ets
        prompt: "以下ArkTS代码中，AppDisplayPage（应用展示页）未正确使用EventHub.on监听displayModeChange事件，导致SettingsPage（设置页）切换网格/列表模式后，应用展示页无法响应切换。另外，EventHub.off未在aboutToDisappear中释放事件，会导致内存泄露。请修复：1）在AppDisplayPage的aboutToAppear中使用eventhub.on监听事件；2）在aboutToDisappear中使用eventhub.off释放事件。注意：这是一个多页面场景，存在两个页面：AppDisplayPage（应用展示页，含网格/列表切换入口）和SettingsPage（设置页，含Checkbox切换控件）。请同时修复这两个页面中缺失的EventHub相关代码"

  # ── Code Compile ─────────────────────────────────────────────
  - id: scenario_002
    name: "Code Compile"
    description: "生成可通过ArkTS编译器检查的正确代码"
    difficulty: easy
    tags: [arkts, code-quality]
    cases:
      - id: case_004
        case_id: compilable_001
        title: "生成可编译的List组件代码"
        category: specialized
        input_file: test_cases/compilable/001/input.ets
        expected_file: test_cases/compilable/001/expected.ets
        prompt: "请生成一个包含List组件的ArkTS页面，要求代码可以通过ArkTS编译器检查"

      - id: case_005
        case_id: compilable_002
        title: "生成可编译的Form表单代码"
        category: specialized
        input_file: test_cases/compilable/002/input.ets
        expected_file: test_cases/compilable/002/expected.ets
        prompt: "请生成一个包含TextInput和Button组件的ArkTS表单页面，要求代码可以通过ArkTS编译器检查"

  # ── Performance ─────────────────────────────────────────────
  - id: scenario_003
    name: "Performance"
    description: "优化List和Swiper等高频组件的滑动性能"
    difficulty: hard
    tags: [arkts, performance]
    cases:
      - id: case_006
        case_id: performance_001
        title: "List组件滑动性能优化"
        category: specialized
        input_file: test_cases/performance/001/input.ets
        expected_file: test_cases/performance/001/expected.ets
        prompt: "请优化以下List组件代码，使其支持大数据量滑动时的流畅性能（需要使用LazyForEach和cachedCount）"

      - id: case_007
        case_id: performance_002
        title: "Swiper组件滑动性能优化"
        category: specialized
        input_file: test_cases/performance/002/input.ets
        expected_file: test_cases/performance/002/expected.ets
        prompt: "请优化以下Swiper组件代码，使其在自动播放和手动滑动时保持流畅性能"

  # ── Project Gen ─────────────────────────────────────────────
  - id: scenario_004
    name: "Project Gen"
    description: "从零构建完整的HarmonyOS项目结构"
    difficulty: hard
    tags: [arkts, project-gen]
    cases:
      - id: case_008
        case_id: project_gen_001
        title: "生成ArkTS List页面工程"
        category: specialized
        input_file: test_cases/project_gen/001/input.ets
        expected_file: test_cases/project_gen/001/expected.ets
        prompt: "请生成一个包含List组件的ArkTS页面工程，包含完整的项目目录结构和必要的配置文件"

      - id: case_009
        case_id: project_gen_002
        title: "生成ArkTS Navigation路由工程"
        category: specialized
        input_file: test_cases/project_gen/002/input.ets
        expected_file: test_cases/project_gen/002/expected.ets
        prompt: "请生成一个使用Navigation组件实现路由的ArkTS工程，包含主页、详情页和设置页"

  # ── General ─────────────────────────────────────────────────
  - id: scenario_005
    name: "General"
    description: "通用用例：验证Agent生成代码的可编译性"
    difficulty: easy
    tags: [arkts, general, compile-check]
    cases:
      - id: case_010
        case_id: general_001
        title: "通用编译检查"
        category: general
        prompt: "请确保代码可编译"

  # ── Multimodal ──────────────────────────────────────────────
  - id: scenario_006
    name: "Multimodal"
    description: "多模态组件开发，组合图片、文字、按钮等多种元素"
    difficulty: medium
    tags: [arkts, multimodal]
    cases:
      - id: case_011
        case_id: multimodal_001
        title: "商品卡片多模态组件"
        category: specialized
        input_file: test_cases/multimodal/001/input.ets
        expected_file: test_cases/multimodal/001/expected.ets
        prompt: "请实现一个商品卡片组件，显示图片、标题和价格，使用多模态布局"

  # ── Code Refactor ────────────────────────────────────────────
  - id: scenario_007
    name: "Code Refactor"
    description: "对现有代码进行重构，提升可读性和可维护性"
    difficulty: medium
    tags: [arkts, refactor]
    cases:
      - id: case_012
        case_id: refactor_001
        title: "登录页面代码重构"
        category: specialized
        input_file: test_cases/refactor/001/input.ets
        expected_file: test_cases/refactor/001/expected.ets
        prompt: "以下登录页面代码结构混乱，请进行重构使其更清晰易维护，保留原有功能"

  # ── Requirement ─────────────────────────────────────────────
  - id: scenario_008
    name: "Requirement"
    description: "根据需求描述生成对应代码，理解并实现业务逻辑"
    difficulty: medium
    tags: [arkts, requirement]
    cases:
      - id: case_013
        case_id: requirement_001
        title: "待办事项列表"
        category: specialized
        input_file: test_cases/requirement/001/input.ets
        expected_file: test_cases/requirement/001/expected.ets
        prompt: "请根据需求实现一个待办事项列表：1.添加待办 2.标记完成 3.删除事项 4.分开显示未完成/已完成"

  # ── Test Gen ────────────────────────────────────────────────
  - id: scenario_009
    name: "Test Gen"
    description: "根据代码生成单元测试用例，覆盖正常和边界情况"
    difficulty: hard
    tags: [arkts, test-gen]
    cases:
      - id: case_014
        case_id: test_gen_001
        title: "数学函数单元测试生成"
        category: specialized
        input_file: test_cases/test_gen/001/input.ets
        expected_file: test_cases/test_gen/001/expected.ets
        prompt: "请为以下数学函数生成完整的单元测试用例，覆盖正常情况和边界情况"
