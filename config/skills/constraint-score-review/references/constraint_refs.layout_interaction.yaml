refs:
  harmony_navigation:
    category: 布局与交互规范
    name: 页面跳转必须统一使用 Navigation
    description: 页面路由必须统一使用 Navigation + NavPathStack / NavDestination 等声明式导航能力，禁止继续使用旧版 router。
    priority: P0
    rules:
      - target: "**/pages/Index.ets"
        ast:
          - type: variable
            name: navPathStack
          - type: call
            name: NavPathStack
          - type: no_import
            name: router

  harmony_avoid_magic_numbers:
    category: 布局与交互规范
    name: 布局与交互实现应尽量避免魔法数
    description: 页面和组件中的间距、尺寸、字号、圆角、位移等度量值应尽量避免直接散落字面量，降低后续调整样式时的维护成本。
    priority: P1
    rules:
      - target: "**/*.ets"
        ast:
          - type: no_literal_number
            context: style_property

  harmony_spacing_size_use_tokens:
    category: 布局与交互规范
    name: 间距与尺寸应使用设计 Token 或统一常量
    description: 当页面或组件设置间距、尺寸、字号、圆角等度量值时，应优先通过设计 Token、资源值或统一常量承接，避免样式数值分散在各个视图文件中。
    priority: P1
    rules:
      - target: "**/*.ets"
        ast:
          - type: property_access
            name: Metrics
          - type: property_access
            name: Spacing
          - type: property_access
            name: Sizes
          - type: call
            name: $r