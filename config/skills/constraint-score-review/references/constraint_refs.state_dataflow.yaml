refs:
  harmony_v2_state_management:
    category: 状态与数据流规范
    name: 页面状态管理必须统一使用 V2 装饰器
    description: 页面组件和状态模型必须统一使用 @ObservedV2、@Trace、@ComponentV2、@Local、@Param、@Provider、@Consumer、@Monitor、@Computed 等 V2 装饰器体系，禁止继续使用旧版 @State、@Link、@ObjectLink 等状态管理写法。
    priority: P0
    rules:
      - target: "**/pages/*.ets"
        ast:
          - type: decorator
            name: ComponentV2
          - type: no_decorator
            name: State
          - type: no_decorator
            name: Link
          - type: no_decorator
            name: ObjectLink
      - target: "**/model/*.ets"
        ast:
          - type: decorator
            name: ObservedV2
          - type: decorator
            name: Trace

  harmony_shared_state_access:
    category: 状态与数据流规范
    name: 多页面共享状态必须通过共享模型或状态容器接入
    description: 当工程同时存在多页面和共享状态目录时，页面应通过 model / store / viewmodel / common 等共享入口承接状态，避免每个页面各自复制一份同名状态。
    priority: P0
    rules:
      - target: "**/pages/*.ets"
        ast:
          - type: import
            name: model
          - type: import
            name: store
          - type: import
            name: viewmodel
          - type: import
            name: common