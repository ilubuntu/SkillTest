agents:
  - id: "baseline"
    name: "默认OpenCode glm5"
    opencode_agent: "build"
    # model: "opencode-go/glm-5"
    # model: "openai/gpt-5.4"
    # model: "bailian-token-plan/glm-5"
    model: "zhipuai-coding-plan/glm-5-turbo"
    mounted_skills:
      - name: "harmonyos-build"
        path: "config/skills/harmonyos-build"
    extra_prompt: "你已挂载harmonyos-build这个skill，完成一轮代码修改并准备结束时，必须先调用skill对当前工程执行一次编译验证，如果编译失败，必须根据编译错误继续修改代码并再次验证，最多重试5轮。在调用skill处理任务的过程中，请使用默认选项直接执行，不需要询问我，你自主决策。"

