defaults:
  adapter: opencode
  api_base: "http://127.0.0.1:4096"
  opencode_agent: "build"
  tools:
    skill: true
  timeout: 480
  temperature: null
  model: "minimax-cn-coding-plan/MiniMax-M2.7"
  mounted_skills:
    - name: "build-harmony-project"
      path: "config/skills/build-harmony-project"
  extra_prompt: "你已挂载 build-harmony-project skill，完成一轮代码修改并准备结束时，必须先调用这个 skill对当前工程执行一次编译验证；如果编译失败，必须根据完整编译错误继续修改代码并再次验证，最多重试5轮。最终输出中必须明确说明是否调用了build-harmony-project、是否执行成功；如果失败，必须说明失败阶段和错误原因"

agents:
  - id: agent_default
    name: "OpenCode"
    adapter: opencode
    api_base: "http://127.0.0.1:4096"
    opencode_agent: "build"
    model: "minimax-cn-coding-plan/MiniMax-M2.7"
    enabled: true

  - id: "codex_local"
    name: "Codex Local"
    adapter: codex_http
    transport: "cli"
    api_base: "http://127.0.0.1:8001"
    cli_path: "codex"
    model: "gpt-5.1-codex-mini"
    timeout: 900
    extra_prompt: "你已挂载 build-harmony-project skill，完成一轮代码修改并准备结束时，必须先调用这个 skill对当前工程执行一次编译验证；如果编译失败，必须根据完整编译错误继续修改代码并再次验证，最多重试5轮。最终输出中必须明确说明是否调用了build-harmony-project、是否执行成功；如果失败，必须说明失败阶段和错误原因"
    env:
      http_proxy: "http://127.0.0.1:7890"
      https_proxy: "http://127.0.0.1:7890"
      HTTP_PROXY: "http://127.0.0.1:7890"
      HTTPS_PROXY: "http://127.0.0.1:7890"
    enabled: true

  - id: "static_code_score_agent"
    name: "静态代码打分 Agent"
    adapter: opencode
    api_base: "http://127.0.0.1:4096"
    opencode_agent: "build"
    model: "minimax-cn-coding-plan/MiniMax-M2.7"
    tools:
      skill: true
    timeout: 480
    mounted_skills:
      - name: "static-code-score-review"
        path: "config/skills/static-code-score-review"
    extra_prompt: "你已挂载 static-code-score-review skill。完成代码分析后，必须调用该 skill 输出静态代码质量评分。"
    enabled: true

  - id: "constraint_score_agent"
    name: "约束规则打分 Agent"
    adapter: opencode
    api_base: "http://127.0.0.1:4096"
    opencode_agent: "build"
    model: "minimax-cn-coding-plan/MiniMax-M2.7"
    tools:
      skill: true
    timeout: 480
    mounted_skills:
      - name: "constraint-score-review"
        path: "config/skills/constraint-score-review"
    extra_prompt: "你已挂载 constraint-score-review skill。完成代码分析后，必须调用该 skill 输出约束规则评分。最终输出中必须明确说明是否调用了constraint-score-review，并严格按照输出要求输出结果"
    enabled: true
