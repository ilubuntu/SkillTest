# HarmonyOS 工具链配置。
# 程序启动时会优先读取当前平台配置，并校验以下 4 个路径是否真实可用：
# - node
# - hvigor
# - harmonyos_sdk
# - java_home
# 如果当前平台配置无效且 auto_detect=true，会继续自动探测；
# 自动探测后仍失败，执行器将直接拒绝启动。
harmony_toolchain:
  # 为 true 时，当前平台配置不通过后继续自动探测。
  # 为 false 时，只认下方显式配置，配置错误将直接启动失败。
  auto_detect: true

  # macOS 环境，一般填写 DevEco Studio.app 内部实际路径。
  macos:
    node: "/Applications/DevEco-Studio.app/Contents/tools/node/bin/node"
    hvigor: "/Applications/DevEco-Studio.app/Contents/tools/hvigor/bin/hvigorw.js"
    harmonyos_sdk: "/Applications/DevEco-Studio.app/Contents/sdk"
    java_home: "/Applications/DevEco-Studio.app/Contents/jbr/Contents/Home"

  # Linux 云测服务器环境，一般填写 command-line-tools 路径。
  # 如果服务器没有安装 DevEco Studio，而是只装了 command-line-tools，
  # 重点确认这 4 个路径都真实存在。
  linux:
    node: "/home/work/hmsdk/command-line-tools/tool/node/bin/node"
    hvigor: "/home/work/hmsdk/command-line-tools/hvigor/bin/hvigorw.js"
    harmonyos_sdk: "/home/work/hmsdk/command-line-tools/sdk"
    java_home: "/usr/lib/jvm/java-11-openjdk-amd64"

  # Windows 环境，一般填写 DevEco Studio 安装目录下的实际路径。
  windows:
    node: "C:\\Program Files\\Huawei\\DevEco Studio\\tools\\node\\node.exe"
    hvigor: "C:\\Program Files\\Huawei\\DevEco Studio\\tools\\hvigor\\bin\\hvigorw.js"
    harmonyos_sdk: "C:\\Program Files\\Huawei\\DevEco Studio\\sdk"
    java_home: "C:\\Program Files\\Huawei\\DevEco Studio\\jbr"

# 任务管理配置。
task_manager:
  # 最大并发执行数。
  # 超过该值的新任务会进入等待队列，不会被直接丢弃。
  max_concurrency: 3

  # 云测管理台地址。
  # 执行器会向该地址上报任务进度和最终结果。
  cloud_base_url: "http://47.100.28.161:3000"

# OpenCode SSE 落盘配置。
opencode:
  # OpenCode Server 地址。
  # 当前执行器和 agent 统一使用这个地址访问 OpenCode HTTP Server。
  opencode_server_url: "http://127.0.0.1:4096"

  # 单个 Agent 任务超时时间（秒）。
  # 当前统一走全局配置，不再按 agents.yaml 单独配置。
  timeout: 600

  # 单个 Agent 任务最大总运行时间（秒）。
  # 这是硬兜底，不依赖 SSE / HTTP 轮询是否仍有活动；超过后直接按失败收口。
  max_task_runtime_seconds: 7200

  # OpenCode 全局配置文件路径，用于自动启动 opencode server 前复制到隔离 XDG 目录。
  # 读取顺序：
  # 1. 优先读取当前平台对应的 opencode_config_path
  # 2. 配置项为空或文件不存在时，回退查找用户目录
  # 3. 全部找不到时，执行器启动失败，避免 provider 缺失后任务静默超时
  # 三个平台默认建议：
  # - macos: 通常是 ~/.opencode/opencode.json
  # - linux: root 用户云测通常是 /root/.config/opencode/opencode.json
  # - windows: 通常是 %APPDATA%\\opencode\\opencode.json
  opencode_config_path:
    macos: "~/.opencode/opencode.json"
    linux: "/root/.config/opencode/opencode.json"
    windows: "%APPDATA%\\opencode\\opencode.json"

  # SSE 原始事件落盘档位。
  # - full:
  #   - sse_full: 只保留当前 session 的完整原始 SSE
  #   - sse_events: 只保留当前 session 的裁剪事件；message.part.delta 不写，其它事件保留
  # - medium:
  #   - sse_full: 在 full 基础上进一步裁剪，去掉顶层 event / data.directory / data.project，
  #               递归去掉 sessionID / messageID / partID，并把所有 patch 裁到 100 字符
  #   - sse_events: 在 full 基础上进一步去掉顶层 event / data.project，以及常见 time / id / sessionID 字段
  # - low:
  #   - sse_full: 只保留关键事件类型 message.part.updated / message.updated / session.status /
  #               session.idle / session.updated / sse.error，并压缩成最小必要字段
  #   - sse_events: 只保留关键进度事件 message.part.updated(step-start/reasoning/tool/patch/text/step-finish)、
  #                 session.status、session.idle，并压缩成最小必要字段
  sse_filter: "medium"

# 日志配置。
# 这些配置控制执行器自己的日志文件，不影响业务结果。
logging:
  # 日志级别。通常保持 INFO 即可。
  level: "INFO"

  # 进程级总日志文件名，位于 logs/ 目录下。
  executor_log_filename: "agent_bench.log"

  # 当前总日志指针文件名，位于 logs/ 目录下。
  # 里面只保存当前总日志文件的实际路径。
  current_executor_log_filename: "current_executor_log"

  # 单个任务目录下的详细日志文件名。
  # 每个 execution 会在 results/execution_xxx/ 下生成这份文件。
  local_execution_log_filename: "local_execution.log"

  # 总日志滚动周期。
  # H 表示按小时滚动。
  rotation_when: "H"

  # 最多保留多少份历史滚动日志。
  # 当前按小时滚动，因此 72 表示大约保留最近 72 小时（3 天）。
  backup_count: 72

# OpenCode 权限配置提醒：
# 当前程序不会自动把下面的配置写入 ~/.opencode/opencode.json。
# 如果需要放开 OpenCode 的外部目录/工具权限，请手动把对应 permission 节点加到 ~/.opencode/opencode.json。
# 示例：
  # "permission": {
  #   "read": "allow",
  #   "edit": "allow",
  #   "glob": "allow",
  #   "grep": "allow",
  #   "list": "allow",
  #   "bash": "allow",
  #   "task": "allow",
  #   "external_directory": "allow",
  #   "skill": "allow",
  #   "webfetch": "allow",
  #   "websearch": "allow",
  #   "codesearch": "allow",
  #   "lsp": "allow",
  #   "doom_loop": "allow",
  #   "question": "allow"
  # }
# 或者 全部允许
# "permission": "allow"
