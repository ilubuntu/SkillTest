performance:
  - seed_id: perf_catering_long_list
    title: 优化点餐模板场景中的菜品长列表性能
    input: 优化点餐页面菜品列表的滚动性能和首屏加载
    keywords:
      - 点餐
      - 餐饮
      - 菜品列表
      - 商品列表
      - 长列表
      - 滚动
      - 首屏加载
      - LazyForEach
      - IDataSource
      - CateringOrders
    template:
      name: CateringOrders
      industry: 美食
      app_type: 元服务
    best_practice_refs:
      - 最佳实践/长列表加载丢帧优化.md
      - 最佳实践/懒加载优化性能.md
    problem_statement: 当前点餐页面一次性构造大量菜品数据，使用普通 ForEach 全量渲染，滚动和首屏加载存在明显卡顿。
    optimization_goals:
      - 将菜品列表优化为 LazyForEach 懒加载渲染方式。
      - 减少首屏渲染负担，控制缓存数量。
      - 改善滚动流畅性，避免丢帧。
    constraints:
      - name: 不能继续全量同步渲染大量菜品卡片
        priority: P0
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: call
                name: LazyForEach
            llm: 检查代码中是否去除了全量渲染的大长列表逻辑
      - name: 需要采用LazyForEach和IDataSource实现懒加载
        priority: P1
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: call
                name: LazyForEach
              - type: class
                name: IDataSource
            llm: 检查是否正确实现了IDataSource并用于LazyForEach
      - name: 列表项key需要使用菜品ID，保持稳定
        priority: P1
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: call
                name: LazyForEach
            llm: 检查LazyForEach的键值生成器是否使用了稳定的ID
    starter_kind: performance_catering_long_list

