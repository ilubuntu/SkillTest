requirement:
  - seed_id: req_catering_coupon_extension
    title: 在点餐首页基础上续写优惠券与订单详情链路
    input: 基于当前已有的点餐首页和个人中心，继续开发优惠券中心、订单详情和结算链路，不要重做现有的首页和购物车。
    keywords:
      - 点餐
      - 餐饮
      - 优惠券
      - 订单详情
      - 结算
      - 购物车
      - 提交订单
      - 店铺选择
      - 商品规格
      - 钱包支付
      - CateringOrders
    template:
      name: CateringOrders
      industry: 美食
      app_type: 元服务
    existing_features:
      - 首页城市选择、banner位、扫一扫、预约订座、排队取号
      - 店铺选择/详情/位置导航/电话、商品列表/搜索/详情/规格、购物车/清空/修改数量/下单
      - 个人中心、钱包充值/账单明细、优惠券列表、积分、帮助中心
    new_requirement_scope:
      - 在个人中心新增优惠券快捷入口，并跳转到优惠券中心页面。
      - 优惠券中心页至少要展示可用优惠券和即将过期优惠券，并支持基础切换或筛选。
      - 新增订单详情页，支持查看已完成订单的详情信息。
    template_constraints:
      - 必须复用现有点餐首页布局和信息层级，不能整体推翻重做。
      - 新增能力应以增量扩展的方式接入，例如新增页面或新增组件。
      - 保留现有首页内容，并确保新增导航链路可以端到端使用。
    starter_kind: requirement_catering_coupon_extension
    constraints:
      - name: 在个人中心新增优惠券入口，并跳转到优惠券中心页面
        priority: P0
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: navigation
                target: MyCouponsPage
            llm: 检查是否有入口跳转到优惠券中心页面
      - name: 优惠券中心页至少要展示可用优惠券和即将过期优惠券，并支持基础切换或筛选
        priority: P1
        rules:
          - target: "**/pages/MyCouponsPage.ets"
            ast:
              - type: call
                name: Tabs
              - type: call
                name: ForEach
            llm: 检查页面是否展示分组和筛选控件
      - name: 新增订单详情页，支持查看已完成订单的详情信息
        priority: P1
        rules:
          - target: "**/pages/*Order*.ets"
            ast:
              - type: file_exists
                name: "**/pages/*Order*.ets"
            llm: 检查是否有订单详情页面展示订单信息
      - name: 必须复用现有点餐首页布局，不能整体推翻重做
        priority: P1
        rules:
          - target: "**/pages/Index.ets"
            ast:
              - type: rule_ref
                name: must_keep_file
            llm: 检查是否保留了现有首页结构

  - seed_id: req_news_detail_extension
    title: 在新闻资讯流基础上续写新闻详情与相关推荐链路
    input: 基于当前已有的新闻资讯流首页，继续开发新闻详情页、相关推荐区域和详情到详情的跳转链路，不要重做现有首页。
    keywords:
      - 新闻
      - 资讯
      - 资讯流
      - 新闻详情
      - 相关推荐
      - 评论
      - 收藏
      - 分享
      - 视频播放
      - 字号设置
      - News
    template:
      name: News
      industry: 新闻
      app_type: 元服务
    existing_features:
      - 首页新闻列表/卡片、视频播放、收藏、分享、评论
      - 我的页面：浏览记录、我的收藏、我的评论、消息、字号设置、隐私协议
    new_requirement_scope:
      - 补齐新闻详情页，并支持从现有新闻卡片点击进入详情阅读。
      - 详情页需要展示标题、来源、正文和相关推荐区域。
      - 点击相关推荐后应继续进入另一条详情，形成可复用的详情链路。
    template_constraints:
      - 必须保留现有资讯首页，并在其基础上扩展阅读链路。
      - 详情能力应落到新页面或独立组件中，不能把正文内容直接塞回首页。
      - 首页与详情页之间需要使用清晰的数据传递方式，不能写死单条文章。
    starter_kind: requirement_news_detail_extension
    constraints:
      - name: 补齐新闻详情页，并支持从现有新闻卡片点击进入详情阅读
        priority: P0
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: file_exists
                name: "**/NewsDetail*.ets"
              - type: navigation
                target: NewsDetail
            llm: 检查是否有入口跳转到新闻详情页面
      - name: 详情页需要展示标题、来源、正文和相关推荐区域
        priority: P1
        rules:
          - target: "**/NewsDetail*.ets"
            ast:
              - type: call
                name: Text
            llm: 检查页面是否包含标题、来源、正文和相关推荐区域的渲染逻辑
      - name: 点击相关推荐后应继续进入另一条详情，形成可复用的详情链路
        priority: P1
        rules:
          - target: "**/NewsDetail*.ets"
            ast:
              - type: navigation
                target: NewsDetail
            llm: 检查点击相关推荐是否能跳转到新的详情页

  - seed_id: req_shopping_cart_extension
    title: 在商城首页基础上续写购物车与结算链路
    input: 基于当前已有的商城首页和商品分类页，继续开发购物车页、数量调整和结算摘要链路，不要重做现有商品浏览能力。
    keywords:
      - 商城
      - 购物车
      - 结算
      - 优惠券
      - 商品详情
      - 商品规格
      - 秒杀
      - 搜索
      - 订单管理
      - 会员中心
      - ComprehensiveMall
    template:
      name: ComprehensiveMall
      industry: 购物
      app_type: 应用
    existing_features:
      - 首页搜索/扫码识别、图片轮播、分类项、秒杀活动、商品卡片瀑布流
      - 分类页二级分类浏览、商品搜索
      - 商品详情页、商品规格选择、优惠券选择、个人中心、设置、会员中心
    new_requirement_scope:
      - 新增购物车页面，并支持从现有首页进入购物车。
      - 购物车页面至少支持数量调整、商品删除和总价汇总。
      - 结算入口需要根据购物车状态联动可用性，形成完整的底部操作区。
    template_constraints:
      - 保留现有商城首页，新增交易链路时不能破坏当前浏览能力。
      - 购物车能力应实现为独立页面或业务组件，不能把所有交易逻辑混入首页。
      - 数量变化后需要实时刷新单项价格和底部结算摘要。
    starter_kind: requirement_shopping_cart_extension
    constraints:
      - name: 新增购物车页面，并支持从现有首页进入购物车
        priority: P0
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: file_exists
                name: "**/CartPage.ets"
              - type: navigation
                target: CartPage
            llm: 检查首页是否有入口跳转到购物车页面
      - name: 购物车页面至少支持数量调整、商品删除和总价汇总
        priority: P1
        rules:
          - target: "**/CartPage.ets"
            ast:
              - type: call
                name: Text
            llm: 检查页面是否实现了数量调整、商品删除和总价汇总的逻辑
      - name: 总价和勾选汇总建议使用派生状态实现
        priority: P1
        rules:
          - target: "**/CartPage.ets"
            ast:
              - type: decorator
                name: Computed
            llm: 检查是否使用 @Computed 或类似派生状态计算总价和勾选汇总

bug_fix:
  - seed_id: bug_fix_catering_list_refresh
    title: 修复点餐模板场景中的购物车列表刷新异常
    input: 修复点餐页面购物车数量更新后界面不刷新的问题
    keywords:
      - 点餐
      - 餐饮
      - 购物车
      - 商品列表
      - 列表刷新
      - ForEach
      - 状态同步
      - 观测装饰器
      - CateringOrders
    template:
      name: CateringOrders
      industry: 美食
      app_type: 元服务
    faq_refs:
      - FAQ/使用ForEach&LazyForEach循环渲染时，会出现更改数据源时，界面不刷新的情况。如何解决.md
      - FAQ/ForEach键值生成规则是怎样的.md
    problem_statement: 当前点餐页面购物车中修改商品数量后，购物车列表不会及时刷新，导致菜品数量和价格显示不一致。
    fix_targets:
      - 修复购物车数量变更后界面不刷新的问题。
      - 避免 ForEach 使用索引作为 key 导致的条目错位。
      - 保持加减操作后的列表展示一致。
    constraints:
      - name: 购物车项更新需要通过可追踪的状态变更驱动
        priority: P0
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: decorator
                name: ObservedV2
              - type: decorator
                name: Trace
            llm: 检查购物车数据是否使用可追踪的状态变更驱动
      - name: 购物车列表渲染需要使用稳定key
        priority: P1
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: call
                name: ForEach
            llm: 检查ForEach是否使用稳定属性作为key
      - name: 数量变化后购物车列表展示和价格必须保持一致
        priority: P1
        rules:
          - target: "**/pages/*.ets"
            ast:
              - type: call
                name: ForEach
            llm: 检查数量调整后列表和价格是否同步刷新
    starter_kind: bug_fix_catering_list_refresh

