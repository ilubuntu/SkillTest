</g>
<line x1="136" y1="230" x2="188" y2="238" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="136" y1="276" x2="188" y2="260" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- 工具层容器 -->
<rect x="358" y="206" width="274" height="124" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="5 4"/>
<text class="ts" x="372" y="220" dominant-baseline="central" style="fill:#888780">工具层</text>

<!-- MCP Server 子分组 -->
<rect x="368" y="226" width="124" height="94" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="430" y="237" text-anchor="middle" dominant-baseline="central" style="fill:#B4B2A9">MCP Server</text>
<g class="c-blue">
  <rect x="374" y="246" width="112" height="28" rx="6" stroke-width="0.5"/>
