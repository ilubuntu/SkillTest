</g>
<line x1="544" y1="56" x2="530" y2="56" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<line x1="457" y1="78" x2="457" y2="98" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<g class="c-pink">
