<svg width="100%" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  svg { font-family: sans-serif; background: #ffffff; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

  .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th   { fill: #633806; }
  .c-amber .ts   { fill: #854F0B; }

  .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th    { fill: #2C2C2A; }
  .c-gray .ts    { fill: #5F5E5A; }

  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th  { fill: #3C3489; }
  .c-purple .ts  { fill: #534AB7; }

  .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th    { fill: #085041; }
  .c-teal .ts    { fill: #0F6E56; }

  .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th   { fill: #712B13; }
  .c-coral .ts   { fill: #993C1D; }

  .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th    { fill: #0C447C; }
  .c-blue .ts    { fill: #185FA5; }

  .c-green rect  { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green .th   { fill: #27500A; }
  .c-green .ts   { fill: #3B6D11; }

  .c-pink rect   { fill: #FBEAF0; stroke: #993556; }
  .c-pink .th    { fill: #72243E; }
  .c-pink .ts    { fill: #993556; }
</style>
</defs>

<!-- ==================== 评测系统 layer ==================== -->
<rect x="20" y="16" width="636" height="140" rx="14" fill="none" stroke="#444441" stroke-width="1" stroke-dasharray="6 4"/>
<rect x="38" y="7" width="68" height="18" rx="4" fill="#ffffff"/>
<text class="ts" x="72" y="16" text-anchor="middle" dominant-baseline="central" style="font-weight:500;fill:#2C2C2A">评测系统</text>

<g class="c-gray">
  <rect x="36" y="34" width="112" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="92" y="51" text-anchor="middle" dominant-baseline="central">测试用例集</text>
  <text class="ts" x="92" y="67" text-anchor="middle" dominant-baseline="central">输入 · 任务描述</text>
</g>
<line x1="148" y1="56" x2="164" y2="56" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g class="c-amber">
  <rect x="164" y="34" width="150" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="239" y="51" text-anchor="middle" dominant-baseline="central">Test Runner</text>
  <text class="ts" x="239" y="67" text-anchor="middle" dominant-baseline="central">驱动 Agent · 收集输出</text>
</g>

<g class="c-green">
