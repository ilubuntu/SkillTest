<text class="ts" x="222" y="174" text-anchor="middle" dominant-baseline="central" style="fill:#5F5E5A">task prompt</text>

<polyline points="310,196 310,176 457,176 457,78" fill="none" stroke="#B4B2A9" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<rect x="356" y="158" width="66" height="16" rx="4" fill="#ffffff"/>
<text class="ts" x="389" y="166" text-anchor="middle" dominant-baseline="central" style="fill:#5F5E5A">最终输出</text>

<!-- ==================== Agent layer ==================== -->
<rect x="20" y="196" width="636" height="144" rx="14" fill="none" stroke="#444441" stroke-width="1"/>
<rect x="38" y="187" width="46" height="18" rx="4" fill="#ffffff"/>
<text class="ts" x="61" y="196" text-anchor="middle" dominant-baseline="central" style="font-weight:500;fill:#2C2C2A">Agent</text>

<g class="c-coral">
  <rect x="36" y="212" width="100" height="36" rx="8" stroke-width="0.5"/>
  <text class="th" x="86" y="225" text-anchor="middle" dominant-baseline="central">Skill A</text>
  <text class="ts" x="86" y="241" text-anchor="middle" dominant-baseline="central">代码生产</text>
</g>
<g class="c-coral">
  <rect x="36" y="258" width="100" height="36" rx="8" stroke-width="0.5"/>
