  <text class="ts" x="338" y="437" text-anchor="middle" dominant-baseline="central">推理 · 生成代码 · 工具决策</text>
</g>

<!-- 图例 -->
<line x1="30" y1="468" x2="58" y2="468" stroke="#1D9E75" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="66" y="468" dominant-baseline="central" style="fill:#5F5E5A">Agent ⇄ LLM</text>
<line x1="180" y1="468" x2="208" y2="468" stroke="#B4B2A9" stroke-width="1.2" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="216" y="468" dominant-baseline="central" style="fill:#5F5E5A">评测系统 ⇄ Agent</text>

