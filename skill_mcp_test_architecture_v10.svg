</g>

<!-- 本地工具 子分组 -->
<rect x="502" y="226" width="124" height="94" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="564" y="237" text-anchor="middle" dominant-baseline="central" style="fill:#B4B2A9">本地工具</text>
<g class="c-gray">
  <rect x="508" y="246" width="112" height="28" rx="6" stroke-width="0.5"/>
  <text class="th" x="564" y="260" text-anchor="middle" dominant-baseline="central">编译 · 运行</text>
</g>
<g class="c-gray">
  <rect x="508" y="282" width="112" height="28" rx="6" stroke-width="0.5"/>
  <text class="th" x="564" y="296" text-anchor="middle" dominant-baseline="central">命令行工具</text>
</g>

<line x1="310" y1="246" x2="356" y2="256" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- ==================== 跨层：Agent ↔ LLM ==================== -->
<line x1="306" y1="340" x2="306" y2="396" stroke="#1D9E75" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<line x1="326" y1="396" x2="326" y2="340" stroke="#1D9E75" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

<!-- ==================== LLM layer ==================== -->
<g class="c-teal">
  <rect x="20" y="396" width="636" height="56" rx="12" stroke-width="0.5"/>
